    function updateQuestionNavState() {
      const questions = getNavigableQuestionKeys();
      const disabled = !questions.length;
      if (questionNextButton) questionNextButton.disabled = disabled;
    }

    function getNavigableQuestionKeys() {
      if (getSearchTerms(viewerSearchQuery).length && transcript && typeof transcript.querySelectorAll === 'function') {
        const keys = [];
        transcript.querySelectorAll('[data-question-key]').forEach(node => {
          const key = node && node.dataset ? node.dataset.questionKey : '';
          if (key && !keys.includes(key)) keys.push(key);
        });
        return keys;
      }
      return getQuestionEvents().map(event => event.questionKey).filter(Boolean);
    }

    function findQuestionElement(questionKey) {
      if (!questionKey || !transcript) return null;
      return Array.from(transcript.querySelectorAll('[data-question-key]')).find(node => node.dataset.questionKey === questionKey) || null;
    }

    let activeQuestionScrollAnimation = 0;
    let activeQuestionScrollToken = 0;
    let transcriptLayoutLockTimer = 0;

    function cancelQuestionScrollAnimation() {
      if (!activeQuestionScrollAnimation) return;
      cancelAnimationFrame(activeQuestionScrollAnimation);
      activeQuestionScrollAnimation = 0;
    }

    function lockTranscriptLayoutForProgrammaticScroll(timeoutMs, onUnlock) {
      if (!transcript || !transcript.classList) return;
      transcript.classList.add('is-programmatic-scroll');
      if (transcriptLayoutLockTimer) clearTimeout(transcriptLayoutLockTimer);
      const lockMs = Number.isFinite(timeoutMs) && timeoutMs > 0 ? timeoutMs : 1200;
      transcriptLayoutLockTimer = setTimeout(() => {
        transcript.classList.remove('is-programmatic-scroll');
        transcriptLayoutLockTimer = 0;
        if (typeof onUnlock === 'function') onUnlock();
      }, lockMs);
    }

    function unlockTranscriptLayoutForProgrammaticScroll() {
      if (transcriptLayoutLockTimer) {
        clearTimeout(transcriptLayoutLockTimer);
        transcriptLayoutLockTimer = 0;
      }
      if (transcript && transcript.classList) {
        transcript.classList.remove('is-programmatic-scroll');
      }
    }

    function calculateQuestionScrollSpacer(element) {
      if (!transcript || !element) return 0;
      const remainingBelow = Math.max(0, transcript.scrollHeight - (element.offsetTop + element.offsetHeight));
      const requiredBelow = Math.max(0, transcript.clientHeight - element.offsetHeight - 32);
      return Math.max(0, requiredBelow - remainingBelow + 32);
    }

    function scrollTranscriptTo(top, behavior, fallbackElement, options) {
      cancelQuestionScrollAnimation();
      const token = ++activeQuestionScrollToken;
      const targetTop = Math.max(0, top);
      if (!transcript || typeof transcript.scrollTo !== 'function') {
        if (fallbackElement && typeof fallbackElement.scrollIntoView === 'function') {
          fallbackElement.scrollIntoView({
            block: 'start',
            behavior: behavior || 'auto'
          });
        }
        return;
      }
      if (options && options.lockLayout) lockTranscriptLayoutForProgrammaticScroll();
      if ((behavior || 'auto') !== 'smooth' || typeof requestAnimationFrame !== 'function') {
        transcript.scrollTo({
          top: targetTop,
          behavior: behavior || 'auto'
        });
        if (!(options && options.keepLayoutLocked)) unlockTranscriptLayoutForProgrammaticScroll();
        return;
      }

      const startTop = transcript.scrollTop || 0;
      const distance = targetTop - startTop;
      const startedAt = performance.now();
      const duration = 220;
      const step = now => {
        if (token !== activeQuestionScrollToken) return;
        const progress = Math.min(1, (now - startedAt) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        transcript.scrollTop = startTop + distance * eased;
        if (progress < 1) {
          activeQuestionScrollAnimation = requestAnimationFrame(step);
        } else {
          activeQuestionScrollAnimation = 0;
          if (!(options && options.keepLayoutLocked)) unlockTranscriptLayoutForProgrammaticScroll();
        }
      };
      activeQuestionScrollAnimation = requestAnimationFrame(step);
    }

    function convergeScrollToQuestion(questionKey, behavior) {
      const token = ++activeQuestionScrollToken;
      lockTranscriptLayoutForProgrammaticScroll();
      let stableFrames = 0;
      let attempts = 0;
      const maxAttempts = 36;
      const settleUnlockedQuestion = () => {
        let unlockedStableFrames = 0;
        let unlockedAttempts = 0;
        const maxUnlockedAttempts = 36;
        const settle = () => {
          if (token !== activeQuestionScrollToken) return;
          const element = findQuestionElement(questionKey);
          if (!element || !transcript) return;
          if (transcript.style) {
            const spacer = calculateQuestionScrollSpacer(element);
            transcript.style.setProperty('--transcript-scroll-spacer', spacer + 'px');
          }
          let targetTop = element.offsetTop - 16;
          if (typeof transcript.getBoundingClientRect === 'function' && typeof element.getBoundingClientRect === 'function') {
            const transcriptRect = transcript.getBoundingClientRect();
            const elementRect = element.getBoundingClientRect();
            targetTop = (transcript.scrollTop || 0) + (elementRect.top - transcriptRect.top) - 16;
          }
          const nextTop = Math.max(0, targetTop);
          transcript.scrollTo({ top: nextTop, behavior: 'auto' });
          const elementTop = typeof element.getBoundingClientRect === 'function' && typeof transcript.getBoundingClientRect === 'function'
            ? element.getBoundingClientRect().top - transcript.getBoundingClientRect().top
            : 16;
          unlockedStableFrames = Math.abs(elementTop - 16) <= 3 ? unlockedStableFrames + 1 : 0;
          unlockedAttempts++;
          if (unlockedStableFrames >= 3 || unlockedAttempts >= maxUnlockedAttempts) return;
          requestAnimationFrame(settle);
        };
        requestAnimationFrame(settle);
      };
      const settle = () => {
        if (token !== activeQuestionScrollToken) return;
        const element = findQuestionElement(questionKey);
        if (!element || !transcript) {
          unlockTranscriptLayoutForProgrammaticScroll();
          return;
        }
        if (transcript.style) {
          const spacer = calculateQuestionScrollSpacer(element);
          transcript.style.setProperty('--transcript-scroll-spacer', spacer + 'px');
        }
        let targetTop = element.offsetTop - 16;
        if (typeof transcript.getBoundingClientRect === 'function' && typeof element.getBoundingClientRect === 'function') {
          const transcriptRect = transcript.getBoundingClientRect();
          const elementRect = element.getBoundingClientRect();
          targetTop = (transcript.scrollTop || 0) + (elementRect.top - transcriptRect.top) - 16;
        }
        const nextTop = Math.max(0, targetTop);
        transcript.scrollTo({ top: nextTop, behavior: 'auto' });
        const delta = Math.abs((transcript.scrollTop || 0) - nextTop);
        stableFrames = delta < 2 ? stableFrames + 1 : 0;
        attempts++;
        if (stableFrames >= 3 || attempts >= maxAttempts) {
          unlockTranscriptLayoutForProgrammaticScroll();
          settleUnlockedQuestion();
          return;
        }
        requestAnimationFrame(settle);
      };
      requestAnimationFrame(settle);
    }

    function stableScrollToQuestionForKeyboard(questionKey) {
      cancelQuestionScrollAnimation();
      const token = ++activeQuestionScrollToken;
      const measureElementTop = element => {
        return typeof element.getBoundingClientRect === 'function' && typeof transcript.getBoundingClientRect === 'function'
          ? element.getBoundingClientRect().top - transcript.getBoundingClientRect().top
          : 16;
      };
      let scrollToMeasuredTarget = null;
      lockTranscriptLayoutForProgrammaticScroll(250, () => {
        if (token !== activeQuestionScrollToken) return;
        const element = findQuestionElement(questionKey);
        if (!element || !transcript || typeof scrollToMeasuredTarget !== 'function') return;
        if (transcript.style) {
          const spacer = calculateQuestionScrollSpacer(element);
          transcript.style.setProperty('--transcript-scroll-spacer', spacer + 'px');
        }
        if (Math.abs(measureElementTop(element) - 16) > 6) {
          scrollToMeasuredTarget();
        }
      });
      const run = () => {
        if (token !== activeQuestionScrollToken) return;
        const element = findQuestionElement(questionKey);
        if (!element || !transcript) {
          unlockTranscriptLayoutForProgrammaticScroll();
          return;
        }
        if (transcript.style) {
          const spacer = calculateQuestionScrollSpacer(element);
          transcript.style.setProperty('--transcript-scroll-spacer', spacer + 'px');
        }
        const measureTargetTop = () => {
          let targetTop = element.offsetTop - 16;
          if (typeof transcript.getBoundingClientRect === 'function' && typeof element.getBoundingClientRect === 'function') {
            const transcriptRect = transcript.getBoundingClientRect();
            const elementRect = element.getBoundingClientRect();
            targetTop = (transcript.scrollTop || 0) + (elementRect.top - transcriptRect.top) - 16;
          }
          return Math.max(0, targetTop);
        };
        scrollToMeasuredTarget = () => {
          transcript.scrollTo({
            top: measureTargetTop(),
            behavior: 'auto'
          });
        };
        scrollToMeasuredTarget();
        requestAnimationFrame(() => {
          if (token !== activeQuestionScrollToken) return;
          const elementTop = measureElementTop(element);
          if (Math.abs(elementTop - 16) > 6) {
            scrollToMeasuredTarget();
          }
        });
      };
      requestAnimationFrame(run);
    }

    function scrollToQuestion(questionKey, behavior) {
      const element = findQuestionElement(questionKey);
      if (!element) return false;
      if (behavior === 'keyboard') {
        stableScrollToQuestionForKeyboard(questionKey);
        return true;
      }
      if (transcript && transcript.style) {
        const spacer = calculateQuestionScrollSpacer(element);
        transcript.style.setProperty('--transcript-scroll-spacer', spacer + 'px');
      }
      let targetTop = element.offsetTop - 16;
      if (transcript && typeof transcript.getBoundingClientRect === 'function' && typeof element.getBoundingClientRect === 'function') {
        const transcriptRect = transcript.getBoundingClientRect();
        const elementRect = element.getBoundingClientRect();
        targetTop = (transcript.scrollTop || 0) + (elementRect.top - transcriptRect.top) - 16;
      }
      if (behavior === 'smooth') {
        convergeScrollToQuestion(questionKey, behavior);
      } else {
        scrollTranscriptTo(targetTop, behavior === 'keyboard' ? 'auto' : (behavior || 'auto'), element);
      }
      return true;
    }

    function highlightCurrentQuestion() {
      if (!transcript) return;
      transcript.querySelectorAll('[data-question-key]').forEach(node => {
        node.classList.toggle('is-current-question', !!selectedQuestionKey && node.dataset.questionKey === selectedQuestionKey);
      });
      updateQuestionNavState();
    }

    function setSelectedQuestionKey(questionKey, options) {
      const settings = options || {};
      selectedQuestionKey = questionKey || null;
      selectedQuestionKeyIsTemporary = !!settings.temporary;
      highlightCurrentQuestion();
      if (selectedQuestionKey && settings.persistAnchor !== false && typeof saveProgressAnchorForCurrentSession === 'function') {
        saveProgressAnchorForCurrentSession();
      }
      if (settings && settings.scroll) {
        const behavior = settings.behavior || 'smooth';
        if (behavior === 'keyboard') {
          stableScrollToQuestionForKeyboard(selectedQuestionKey);
        } else {
          requestAnimationFrame(() => scrollToQuestion(selectedQuestionKey, behavior));
        }
      }
    }

    function focusFirstQuestion(options) {
      const questions = syncSelectedQuestionKey('first');
      if (!questions.length) return false;
      setSelectedQuestionKey(questions[0].questionKey, options || { scroll: false });
      return true;
    }

    function focusLastQuestion(options) {
      const questions = syncSelectedQuestionKey('last');
      if (!questions.length) return false;
      setSelectedQuestionKey(questions[questions.length - 1].questionKey, options || { scroll: false });
      return true;
    }

    function jumpQuestion(direction) {
      const questions = getNavigableQuestionKeys();
      if (!questions.length) return;
      let index = questions.indexOf(selectedQuestionKey);
      if (index < 0) index = direction > 0 ? -1 : questions.length;
      const nextIndex = Math.max(0, Math.min(questions.length - 1, index + direction));
      const nextQuestionKey = questions[nextIndex];
      if (!nextQuestionKey) return;
      setSelectedQuestionKey(nextQuestionKey, { scroll: true, behavior: 'keyboard' });
    }

    function handleQuestionSelectionFromRender() {
      const questions = syncSelectedQuestionKey(null, { useProgressAnchor: true });
      if (!questions.length) return;
      highlightCurrentQuestion();
    }

    function syncViewerToolbar(session) {
      if (!session) {
        viewerToolbar.classList.add('hidden');
        viewerToolbarActions.innerHTML = '';
        if (replyComposer) replyComposer.classList.add('hidden');
        return;
      }

      viewerToolbar.classList.remove('hidden');
      viewerToolbarActions.innerHTML = renderReaderToolbarActions(session);
      if (document.activeElement !== viewerSearchInput && viewerSearchInput.value !== viewerSearchQuery) {
        viewerSearchInput.value = viewerSearchQuery;
      }
      viewerToolbar.querySelectorAll('button[data-view-mode]').forEach(button => {
        button.classList.toggle('active', button.dataset.viewMode === viewerViewMode);
      });
      viewerToolbar.querySelectorAll('button[data-search-scope]').forEach(button => {
        button.classList.toggle('active', button.dataset.searchScope === viewerSearchScope);
      });
      updateQuestionNavState();
      syncReplyComposer();
    }

    function buildReaderMarkup(events, options) {
      resetMessageCopyTexts();
      const output = [];
      let processItems = [];
      const selectedKey = options && options.selectedQuestionKey ? options.selectedQuestionKey : '';

      function flushProcessItems() {
        if (!processItems.length) return;
        output.push(renderCollapsedProcessItems(processItems, options));
        processItems = [];
      }

      events.forEach(event => {
        if (!event) return;

        if (['assistant_commentary', 'tool', 'system'].includes(event.kind)) {
          processItems.push(event);
          return;
        }

        if (event.kind === 'user') {
          flushProcessItems();
          output.push(renderEvent(event, {
            questionKey: event.questionKey || '',
            isCurrentQuestion: !!event.questionKey && event.questionKey === selectedKey
          }));
          return;
        }

        if (event.kind === 'assistant_final') {
          flushProcessItems();
          output.push(renderEvent(event));
        }
      });

      flushProcessItems();
      return output.join('');
    }

    function renderViewer() {
      const session = getSelectedSession();
      if (!session) {
        resetMessageCopyTexts();
        const searchMessage = getGlobalSearchEmptyText() || getEmptySourceText();
        viewerHead.innerHTML = getGlobalSearchQuery()
          ? '<div class="empty-state">' + escapeHtml(searchMessage || ('当前会话中没有匹配“' + viewerSearchQuery + '”的内容。')) + '</div>'
          : '<div class="empty-state">' + escapeHtml(searchMessage || '左侧选中一个标题后，这里会显示完整聊天内容。') + '</div>';
        syncViewerToolbar(null);
        transcript.innerHTML = getGlobalSearchQuery()
          ? '<div class="empty-state">' + escapeHtml(searchMessage || ('当前会话中没有匹配“' + viewerSearchQuery + '”的内容。')) + '</div>'
          : '';
        selectedQuestionKey = null;
        selectedQuestionKeyIsTemporary = false;
        return;
      }

      if (getGlobalSearchQuery() && !sessionMatchesGlobalSearch(session)) {
        const searchMessage = getGlobalSearchEmptyText();
        resetMessageCopyTexts();
        syncViewerToolbar(session);
        transcript.innerHTML = '<div class="empty-state">' + escapeHtml(searchMessage || ('当前会话中没有匹配“' + viewerSearchQuery + '”的内容。')) + '</div>';
        highlightCurrentQuestion();
        return;
      }

      const tags = [];
      if (session.archived) tags.push('归档');
      else tags.push('当前');
      if (session.hasImageReference) tags.push('含图片引用');
      if (session.modelProvider) tags.push('provider: ' + session.modelProvider);
      if (session.source) tags.push('source: ' + session.source);

      viewerHead.innerHTML =
        '<div class="viewer-head-row">' +
          '<p class="viewer-meta">创建：' + escapeHtml(session.createdLocal) + ' · 用户 ' + session.userCount + ' · 回答 ' + session.assistantCount + '</p>' +
          '<div class="viewer-tags">' + tags.map(tag => '<span class="stat">' + escapeHtml(tag) + '</span>').join(' ') + '</div>' +
        '</div>' +
        '<p class="viewer-path">' + escapeHtml(session.path) + '</p>';
      syncViewerToolbar(session);

      if (!isDetailLoadedForSession(session)) {
        transcript.innerHTML = '<div class="empty-state">正在加载会话详情...</div>';
        return;
      }

      const query = viewerSearchQuery.trim().toLowerCase();
      const events = getVisibleDetailEvents();
      const questionFocus = pendingQuestionFocus;
      pendingQuestionFocus = null;
      if (query) {
        const visibleQuestionKeys = [];
        events.forEach(event => {
          if (event && event.kind === 'user' && event.questionKey && !visibleQuestionKeys.includes(event.questionKey)) {
            visibleQuestionKeys.push(event.questionKey);
          }
        });
        if (!visibleQuestionKeys.includes(selectedQuestionKey)) {
          selectedQuestionKey = visibleQuestionKeys[0] || null;
          selectedQuestionKeyIsTemporary = !!selectedQuestionKey;
        }
      } else {
        syncSelectedQuestionKey(questionFocus, { useProgressAnchor: !questionFocus });
      }
      if (!events.length) {
        resetMessageCopyTexts();
        const searchMessage = getGlobalSearchEmptyText();
        transcript.innerHTML = query
          ? '<div class="empty-state">' + escapeHtml(searchMessage || ('当前会话中没有匹配“' + viewerSearchQuery + '”的内容。')) + '</div>'
          : '<div class="empty-state">这条会话没有匹配当前视图的内容。</div>';
        if (query) selectedQuestionKeyIsTemporary = !!selectedQuestionKey;
        highlightCurrentQuestion();
        return;
      }

        transcript.innerHTML = buildReaderMarkup(events, {
          autoExpandGroups: false,
          searchQuery: query,
          selectedQuestionKey: selectedQuestionKey
        });
        hydrateOpenLazyDetails(transcript);
        highlightMatchesInElement(transcript, getSearchTerms(viewerSearchQuery));
        highlightCurrentQuestion();
        if (selectedQuestionKey && (questionFocus || viewerViewMode === 'all')) {
          requestAnimationFrame(() => scrollToQuestion(selectedQuestionKey, 'auto'));
        }
      updateReplyComposerState();
    }

    async function selectSessionFromTitlePane(session) {
      syncSessionListSelection();
      await selectSession(session, { syncLists: false });
    }

    async function selectSession(session, options) {
      const settings = Object.assign({ syncLists: true }, options || {});
      const key = getSessionKey(session);
      const isDifferentSession = !isDetailLoadedForSession(session);
      if (isDifferentSession) saveProgressAnchorForCurrentSession();
      const targetAnchor = getProgressAnchorForSession(session);
      const selectRestoreToken = ++progressRestoreToken;
      selectedSessionKey = key;
      if (isDifferentSession) {
        clearCurrentDetail();
      }
      if (settings.syncLists) {
        renderWorkspaceList(true);
      } else {
        syncSessionListSelection();
      }
      transcript.innerHTML = '<div class="empty-state">正在加载会话详情...</div>';
      try {
          const detail = await loadSessionDetail(session);
          if (!applyLoadedDetail(session, detail)) return;
          pendingQuestionFocus = targetAnchor ? null : 'last';
          renderViewer();
          if (targetAnchor) {
            restoreProgressAnchor(targetAnchor, { token: selectRestoreToken, behavior: 'auto' });
          } else {
            requestAnimationFrame(() => focusTranscriptForQuestionNavigation());
          }
        } catch (error) {
        if (selectedSessionKey !== key) return;
        viewerHead.innerHTML = '<div class="empty-state">会话详情加载失败。</div>';
        transcript.innerHTML = '<div class="empty-state">' + escapeHtml(error.message || '未知错误') + '</div>';
      }
    }

    if (sourceSelect) {
      sourceSelect.addEventListener('change', event => {
        void switchSource(event.target.value || 'local-codex');
      });
    }
    Object.keys(collapseButtons).forEach(key => {
      const button = collapseButtons[key];
      if (!button) return;
      button.addEventListener('click', () => setPaneCollapsed(key, true));
    });
    Object.keys(expandButtons).forEach(key => {
      const button = expandButtons[key];
      if (!button) return;
      button.addEventListener('click', () => setPaneCollapsed(key, false));
    });
    if (globalSidebarToggleButton) {
      globalSidebarToggleButton.addEventListener('click', toggleAllSidebars);
    }
    workspaceFilterInput.addEventListener('input', () => {
      renderWorkspaceList();
    });
    sessionFilterInput.addEventListener('input', () => {
      renderSessionList();
    });
    sessionList.addEventListener('contextmenu', event => {
      const item = event.target && event.target.closest('.title-group-head, .session-btn');
      if (!item) return;
      event.preventDefault();
      event.stopPropagation();
      openNoteMenu(event, noteTargetFromElement(item));
    });
    sessionList.addEventListener('mouseover', event => {
      const item = event.target && event.target.closest('.title-group-head.has-note, .session-btn.has-note');
      if (!item || !sessionList.contains(item)) return;
      showNoteTooltip(event, noteTargetFromElement(item));
    });
    sessionList.addEventListener('mousemove', event => {
      const item = event.target && event.target.closest('.title-group-head.has-note, .session-btn.has-note');
      if (!item) return;
      moveNoteTooltip(event);
    });
    sessionList.addEventListener('mouseout', event => {
      const item = event.target && event.target.closest('.title-group-head.has-note, .session-btn.has-note');
      if (!item) return;
      if (event.relatedTarget && item.contains(event.relatedTarget)) return;
      hideNoteTooltip();
    });
    viewerSearchInput.addEventListener('input', () => {
      viewerSearchQuery = viewerSearchInput.value || '';
      if (viewerSearchInputIsComposing) return;
      if (!viewerSearchQuery.trim() && currentScopeSearchTimer) {
        clearTimeout(currentScopeSearchTimer);
        currentScopeSearchTimer = 0;
        resetGlobalSearchStateForCurrentScope();
        renderViewer();
        restoreCurrentProgressAnchorIfReadable();
        return;
      }
      scheduleViewerSearch();
    });
    viewerSearchInput.addEventListener('compositionstart', () => {
      viewerSearchInputIsComposing = true;
    });
    viewerSearchInput.addEventListener('compositionend', () => {
      viewerSearchInputIsComposing = false;
      viewerSearchQuery = viewerSearchInput.value || '';
      if (!viewerSearchQuery.trim() && currentScopeSearchTimer) {
        clearTimeout(currentScopeSearchTimer);
        currentScopeSearchTimer = 0;
        resetGlobalSearchStateForCurrentScope();
        renderViewer();
        restoreCurrentProgressAnchorIfReadable();
        return;
      }
      scheduleViewerSearch();
    });
    if (replyInput) {
      replyInput.addEventListener('input', () => {
        persistReplyDraft();
      });
      replyInput.addEventListener('compositionstart', () => {
        replyInputIsComposing = true;
      });
      replyInput.addEventListener('compositionend', () => {
        replyInputIsComposing = false;
        saveReplyDraftValueOnly();
        scheduleReplyComposerUpdate();
      });
      replyInput.addEventListener('keydown', event => {
        if (event.key !== 'Enter') return;
        if (replyInputIsComposing || event.isComposing) return;
        if (event.shiftKey) return;
        event.preventDefault();
        void copyReplyCommand();
      });
    }
    if (typeof window !== 'undefined' && window.addEventListener) {
      window.addEventListener('resize', () => {
        resetReplyInputMetrics();
        scheduleReplyComposerUpdate();
      });
    }
    viewerToolbar.addEventListener('click', event => {
      const navButton = event.target.closest('button[data-question-nav]');
      if (navButton) {
        if (navButton.dataset.questionNav === 'bottom') {
          scrollTranscriptBottom();
        }
        return;
      }
      const scopeButton = event.target.closest('button[data-search-scope]');
      if (scopeButton) {
        const previousScope = viewerSearchScope;
        viewerSearchScope = scopeButton.dataset.searchScope || 'all';
        if (viewerSearchScope === 'current') {
          resetGlobalSearchStateForCurrentScope();
          if (previousScope !== 'current') renderWorkspaceList(true);
          renderViewer();
          restoreCurrentProgressAnchorIfReadable();
          return;
        }
        if (currentScopeSearchTimer) {
          clearTimeout(currentScopeSearchTimer);
          currentScopeSearchTimer = 0;
        }
        scheduleGlobalSearch();
        return;
      }
      const button = event.target.closest('button[data-view-mode]');
      if (!button) return;
      const previousMode = viewerViewMode;
      viewerViewMode = button.dataset.viewMode || 'all';
      renderViewer();
      if (restoreCurrentProgressAnchorIfReadable()) return;
      if (previousMode === 'questions' && viewerViewMode === 'all' && selectedQuestionKey) {
        requestAnimationFrame(() => scrollToQuestion(selectedQuestionKey, 'auto'));
      }
    });
    transcript.addEventListener('click', event => {
      if (event.defaultPrevented) return;
      if (event.target && event.target.closest('button, a, input, textarea, select')) return;
      transcript.focus({ preventScroll: true });
      const question = event.target.closest('[data-question-key]');
      if (!question) return;
      setSelectedQuestionKey(question.dataset.questionKey, { scroll: false });
    });
    transcript.addEventListener('toggle', event => {
      if (!event.target || event.target.tagName !== 'DETAILS') return;
      hydrateLazyDetail(event.target);
    }, true);
    document.addEventListener('keydown', event => {
      const active = document.activeElement;
      if (active !== transcript && !transcript.contains(active)) return;
      if (event.target && event.target.closest('button, a, input, textarea, select, [contenteditable="true"]')) return;
      if (event.key && event.key.toLowerCase() === 'k') {
        if (runRefreshRequest._running) return;
        event.preventDefault();
        void refreshCurrentSession();
        return;
      }
      if (event.key === 'ArrowUp') {
        event.preventDefault();
        jumpQuestion(-1);
      }
      if (event.key === 'ArrowDown') {
        event.preventDefault();
        jumpQuestion(1);
      }
    });
    workspaceProviderFilter.addEventListener('change', event => {
      if (event.target && event.target.matches('input[type="checkbox"][data-filter-key="provider"]')) {
        toggleFilterValue('provider', event.target.dataset.value);
      }
    });
    workspaceSourceFilter.addEventListener('change', event => {
      if (event.target && event.target.matches('input[type="checkbox"][data-filter-key="source"]')) {
        toggleFilterValue('source', event.target.dataset.value);
      }
    });
    workspaceSortField.addEventListener('change', () => {
      saveSortPrefs();
      renderWorkspaceList();
    });
    workspaceSortDirection.addEventListener('change', () => {
      saveSortPrefs();
      renderWorkspaceList();
    });
    sessionSortField.addEventListener('change', () => {
      saveSortPrefs();
      renderSessionList();
    });
    sessionSortDirection.addEventListener('change', () => {
      saveSortPrefs();
      renderSessionList();
    });
    if (noteContextMenu) {
      noteContextMenu.addEventListener('click', event => {
        const actionButton = event.target && event.target.closest('button[data-note-action]');
        if (!actionButton || !activeNoteTarget) return;
        const action = actionButton.dataset.noteAction;
        const target = activeNoteTarget;
        closeNoteMenu();
        if (action === 'delete') {
          void deleteNoteForTarget(target);
          return;
        }
        openNoteModal(target);
      });
    }
    if (noteModal) {
      noteModal.addEventListener('click', event => {
        if (event.target === noteModal || (event.target && event.target.closest('[data-note-cancel]'))) {
          closeNoteModal();
        }
        if (event.target && event.target.closest('[data-note-save]')) {
          void saveActiveNote();
        }
      });
    }
    if (imagePreviewModal) {
      imagePreviewModal.addEventListener('click', event => {
        if (event.target === imagePreviewModal) closeImagePreview();
      });
    }
    if (imagePreviewClose) {
      imagePreviewClose.addEventListener('click', closeImagePreview);
    }
    if (noteInput) {
      noteInput.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          event.preventDefault();
          closeNoteModal();
          return;
        }
        if (event.key === 'Enter' && event.ctrlKey) {
          event.preventDefault();
          void saveActiveNote();
        }
      });
    }
    document.addEventListener('click', event => {
      document.querySelectorAll(MENU_SELECTOR + '[open]').forEach(menu => {
        if (!menu.contains(event.target)) {
          menu.removeAttribute('open');
        }
      });
      if (noteContextMenu && !noteContextMenu.hidden && !noteContextMenu.contains(event.target)) {
        closeNoteMenu();
      }
    });
    document.addEventListener('keydown', event => {
      if (event.key !== 'Escape') return;
      if (imagePreviewModal && !imagePreviewModal.hidden) {
        event.preventDefault();
        closeImagePreview();
        return;
      }
      closeNoteMenu();
      if (noteModal && !noteModal.hidden) closeNoteModal();
      hideNoteTooltip();
    });

    syncPaneCollapseState();

    (async function boot() {
      viewerHead.innerHTML = '<div class="empty-state">正在加载索引...</div>';
      transcript.innerHTML = '';
      try {
        await loadSources();
        await loadIndex();
        await loadNotes();
        updateStats();
        refreshFilterMenus();
        renderWorkspaceList(true);
        await loadSelectedDetailIfAvailable();
        renderViewer();
      } catch (error) {
        viewerHead.innerHTML = '<div class="empty-state">索引加载失败。</div>';
        transcript.innerHTML = '<div class="empty-state">' + escapeHtml(error.message || '未知错误') + '</div>';
      }
    })();
  </script>
</body>
</html>
