<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>语迹 - AI 对话记录浏览器</title>
  <style>
    :root {
      --bg: #f3ede3;
      --paper: #fffaf2;
      --panel: #f7efe2;
      --line: #d9c8ac;
      --ink: #241b13;
      --muted: #7a6d5c;
      --accent: #8f4d1f;
      --accent-soft: #e9d5bf;
      --user: #fbf1e3;
      --assistant: #f1f6ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 0% 0%, rgba(143,77,31,.16), transparent 28rem),
        linear-gradient(135deg, #f7f0e4, var(--bg));
    }
    html,
    body {
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    header {
      flex: none;
      padding: 10px clamp(14px, 4vw, 28px);
      border-bottom: 1px solid var(--line);
      background: rgba(255,250,242,.78);
      backdrop-filter: blur(12px);
      z-index: 5;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }
    .header-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.1;
      flex: none;
    }
    .app-subtitle {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }
    .version-badge {
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      margin-left: 8px;
      padding: 4px 8px;
      border: 1px solid rgba(143,77,31,.28);
      border-radius: 999px;
      background: rgba(233,213,191,.62);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .stat {
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.52);
      font-size: 12px;
    }
    .source-selector {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.58);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .source-selector select {
      max-width: min(42vw, 260px);
      border: 0;
      background: transparent;
      color: var(--accent);
      font: inherit;
      font-weight: 800;
      outline: none;
      cursor: pointer;
    }
    .refresh-btn {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(143,77,31,.55);
      border-radius: 12px;
      padding: 10px 16px;
      background: linear-gradient(180deg, rgba(233,213,191,.95), rgba(223,193,164,.95));
      color: #6f3813;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(60,44,27,.08);
    }
    .refresh-btn:disabled {
      cursor: wait;
      opacity: .78;
    }
    .refresh-btn::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(143,77,31,.88), transparent);
      opacity: 0;
      transform: translateX(-120%);
    }
    .refresh-btn.is-loading::after {
      opacity: 1;
      animation: refresh-progress 1.05s linear infinite;
    }
    @keyframes refresh-progress {
      from { transform: translateX(-120%); }
      to { transform: translateX(120%); }
    }
    .refresh-btn:hover {
      border-color: var(--accent);
      background: linear-gradient(180deg, rgba(239,220,199,.98), rgba(226,198,170,.98));
    }
    .shell {
      position: relative;
      display: grid;
      grid-template-columns: 240px 320px minmax(0, 1fr);
      flex: 1;
      min-height: 0;
    }
    .shell.is-workspace-collapsed {
      grid-template-columns: 320px minmax(0, 1fr);
    }
    .shell.is-session-collapsed {
      grid-template-columns: 240px minmax(0, 1fr);
    }
    .shell.is-workspace-collapsed.is-session-collapsed {
      grid-template-columns: minmax(0, 1fr);
    }
    .pane {
      position: relative;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(247,239,226,.74);
    }
    .pane.is-collapsed {
      display: none;
    }
    #workspacePane {
      z-index: 30;
    }
    #sessionPane {
      z-index: 20;
    }
    .shell > .viewer {
      z-index: 10;
    }
    .pane + .pane {
      border-left: 1px solid var(--line);
    }
    .pane-header {
      position: relative;
      z-index: 20;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(217,200,172,.72);
      background: rgba(255,250,242,.7);
    }
    .pane-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: nowrap;
    }
    .pane-title-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: none;
      min-width: 0;
      white-space: nowrap;
    }
    .pane-title {
      margin: 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      white-space: nowrap;
    }
    .sort-menu {
      position: static;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
      min-width: 0;
    }
    .pane-collapse-btn,
    .collapsed-controls button {
      border: 1px solid rgba(143,77,31,.24);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255,255,255,.62);
      color: var(--accent);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
    }
    .pane-collapse-btn {
      padding: 7px 9px;
      font-size: 12px;
    }
    .pane-collapse-btn:hover,
    .collapsed-controls button:hover {
      border-color: rgba(143,77,31,.52);
      background: var(--accent-soft);
    }
    .collapsed-controls {
      position: absolute;
      z-index: 45;
      left: 10px;
      top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: none;
    }
    .collapsed-controls[hidden] {
      display: none;
    }
    .collapsed-controls button {
      pointer-events: auto;
      box-shadow: 0 10px 22px rgba(60,44,27,.12);
    }
    .collapsed-controls button[hidden] {
      display: none;
    }
    .sort-menu > summary {
      list-style: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      background: rgba(255,255,255,.56);
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      user-select: none;
    }
    .sort-menu > summary::-webkit-details-marker {
      display: none;
    }
    .sort-menu[open] > summary {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .sort-panel {
      position: absolute;
      right: 12px;
      top: calc(100% + 8px);
      z-index: 1000;
      width: 300px;
      width: min(300px, calc(100% - 24px));
      max-height: min(72vh, 760px);
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--paper);
      box-shadow: 0 22px 54px rgba(60,44,27,.24);
      overflow: auto;
    }
    .sort-panel > label {
      display: block;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .sort-panel select {
      width: 100%;
      margin-top: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: var(--paper);
      color: var(--ink);
      font: inherit;
    }
    .filter-group {
      margin-bottom: 12px;
    }
    .filter-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .checklist {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: none;
      overflow: visible;
    }
    .sort-panel .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-height: 38px;
      padding: 7px 9px;
      border-radius: 10px;
      background: rgba(255,255,255,.34);
      font-size: 13px;
      line-height: 1.35;
      color: var(--ink);
      cursor: pointer;
    }
    .sort-panel .check-item:hover {
      background: rgba(255,255,255,.68);
    }
    .sort-panel .check-item input {
      width: auto;
      margin: 0;
      margin-top: 2px;
      accent-color: var(--accent);
      transform: scale(1.05);
      flex: none;
    }
    .sort-panel .check-item span {
      display: block;
      min-height: 20px;
      word-break: break-word;
    }
    .pane input[type="search"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--paper);
      font: inherit;
    }
    .list {
      position: relative;
      overflow: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .workspace-btn,
    .session-btn {
      position: relative;
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.5);
      padding: 10px;
      cursor: pointer;
      color: var(--ink);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.35;
    }
    .session-btn {
      padding-right: 22px;
    }
    .workspace-btn:hover,
    .session-btn:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,.78);
    }
    .workspace-btn.active,
    .session-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px rgba(143,77,31,.08);
    }
    .workspace-name {
      display: block;
      font-weight: 700;
      line-height: 1.35;
      overflow-wrap: anywhere;
      white-space: normal;
    }
    .workspace-meta,
    .session-meta {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      overflow-wrap: anywhere;
      white-space: normal;
    }
    .session-title {
      display: block;
      font-weight: 700;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .title-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .title-group-head {
      position: relative;
      width: 100%;
      text-align: left;
      border: 1px solid rgba(217,200,172,.82);
      border-radius: 14px;
      background: rgba(255,250,242,.72);
      color: var(--ink);
      padding: 9px 22px 9px 10px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.35;
      cursor: pointer;
    }
    .title-group-head:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,.82);
    }
    .title-group-head.active {
      border-color: var(--accent);
      background: rgba(233,213,191,.48);
      box-shadow: inset 0 0 0 1px rgba(143,77,31,.08);
    }
    .title-group-title {
      display: block;
      font-weight: 800;
      overflow-wrap: anywhere;
      white-space: normal;
    }
    .title-group-meta {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
      white-space: normal;
    }
    .title-group-sessions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-left: 10px;
      border-left: 1px solid rgba(217,200,172,.72);
    }
    .title-group-head.has-note::after,
    .session-btn.has-note::after {
      content: "";
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #b7791f;
      box-shadow: 0 0 0 2px rgba(255,250,242,.9);
      pointer-events: none;
    }
    .title-group-head.active.has-note::after,
    .session-btn.active.has-note::after {
      box-shadow: 0 0 0 2px rgba(255,255,255,.9);
    }
    .note-menu {
      position: fixed;
      z-index: 3000;
      min-width: 132px;
      padding: 6px;
      border: 1px solid rgba(143,77,31,.24);
      border-radius: 12px;
      background: var(--paper);
      box-shadow: 0 18px 44px rgba(60,44,27,.22);
    }
    .note-menu button {
      display: block;
      width: 100%;
      border: 0;
      border-radius: 9px;
      padding: 9px 10px;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
    }
    .note-menu button:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .note-menu[hidden],
    .note-modal[hidden],
    .image-preview-modal[hidden],
    .note-tooltip[hidden] {
      display: none !important;
    }
    .note-modal {
      position: fixed;
      inset: 0;
      z-index: 2800;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(36,27,19,.28);
    }
    .note-modal-card {
      width: min(680px, calc(100vw - 44px));
      max-height: min(84vh, 760px);
      padding: 18px;
      border: 1px solid rgba(143,77,31,.24);
      border-radius: 20px;
      background: var(--paper);
      box-shadow: 0 28px 80px rgba(60,44,27,.28);
      overflow: auto;
    }
    .note-modal-card h2 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 18px;
    }
    .note-context {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .note-modal textarea {
      width: 100%;
      min-height: 180px;
      max-height: 52vh;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fffdf7;
      color: var(--ink);
      font: inherit;
      line-height: 1.65;
      resize: vertical;
    }
    .note-modal textarea:focus {
      outline: none;
      border-color: rgba(143,77,31,.55);
      box-shadow: 0 0 0 3px rgba(143,77,31,.10);
    }
    .note-error {
      min-height: 18px;
      margin: 8px 0 0;
      color: #8b2d24;
      font-size: 12px;
    }
    .note-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }
    .note-modal-actions button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 14px;
      background: var(--paper);
      color: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .note-modal-actions button[data-note-save] {
      border-color: rgba(143,77,31,.55);
      background: linear-gradient(180deg, rgba(233,213,191,.98), rgba(223,193,164,.98));
      color: #6f3813;
    }
    .note-tooltip {
      position: fixed;
      z-index: 3200;
      min-width: 260px;
      max-width: min(70vw, 760px);
      max-height: min(70vh, 620px);
      padding: 12px 14px;
      border: 1px solid rgba(143,77,31,.38);
      border-radius: 14px;
      background: linear-gradient(180deg, #fff8d8, #fff3bd);
      color: #332412;
      box-shadow: 0 20px 54px rgba(60,44,27,.26);
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      pointer-events: none;
    }
    .note-tooltip-label {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
    }
    .note-tooltip-body {
      font-size: 14px;
      line-height: 1.65;
    }
    .viewer {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255,250,242,.55);
    }
    .viewer-head {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,250,242,.85);
    }
    .viewer-head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }
    .reader-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
    }
    .reply-composer {
      position: relative;
      padding: 14px 22px 18px;
      border-top: 1px solid rgba(217,200,172,.72);
      background: rgba(255,250,242,.84);
    }
    .reply-composer textarea {
      width: 100%;
      min-height: 64px;
      max-height: 30em;
      resize: none;
      border: 1px solid rgba(143,77,31,.20);
      border-radius: 16px;
      padding: 12px 16px 58px 14px;
      background: rgba(255,255,255,.86);
      color: var(--ink);
      font: inherit;
      line-height: 1.65;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.65);
      scrollbar-width: thin;
    }
    .reply-composer textarea:focus {
      outline: none;
      border-color: rgba(143,77,31,.55);
      box-shadow: 0 0 0 3px rgba(143,77,31,.10);
    }
    .reply-composer-actions {
      position: absolute;
      right: 34px;
      bottom: 30px;
      display: inline-flex;
      align-items: center;
      max-width: calc(100% - 68px);
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }
    .reply-action {
      border: 1px solid rgba(143,77,31,.22);
      border-radius: 10px;
      padding: 7px 10px;
      background: rgba(255,255,255,.92);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(60,44,27,.08);
    }
    .reply-action:hover {
      border-color: rgba(143,77,31,.45);
      background: #fff;
    }
    .reply-action--clear {
      color: var(--muted);
    }
    .quick-refresh-btn {
      border-color: rgba(143,77,31,.62) !important;
      background: linear-gradient(180deg, rgba(233,213,191,.98), rgba(223,193,164,.98)) !important;
      color: #6f3813 !important;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(60,44,27,.10);
    }
    .reply-action--send {
      border-color: rgba(143,77,31,.62);
      background: linear-gradient(180deg, rgba(233,213,191,.98), rgba(223,193,164,.98));
      color: #6f3813;
      font-weight: 800;
    }
    .reader-toolbar input[type="search"] {
      flex: 1 1 220px;
      min-width: 180px;
    }
    .toolbar-segment {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 12px;
      flex: none;
    }
    .toolbar-segment--view {
      background: rgba(255,255,255,.48);
    }
    .toolbar-segment--search {
      border-color: rgba(143,77,31,.24);
      background: rgba(233,213,191,.34);
    }
    .toolbar-segment--tools {
      flex: 0 1 auto;
      flex-wrap: wrap;
      border-color: rgba(96,124,74,.24);
      background: rgba(241,246,234,.58);
    }
    .viewer-meta,
    .viewer-path {
      margin: 6px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }
    .viewer-head-row .viewer-meta {
      flex: 1 1 260px;
      margin: 0;
    }
    .viewer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .viewer-actions a,
    .reader-toolbar a,
    .viewer-actions button,
    .reader-toolbar button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
      color: var(--accent);
      padding: 7px 10px;
      font-size: 12px;
      line-height: 1.2;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
    }
    .reader-toolbar button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px rgba(143,77,31,.08);
    }
    .transcript {
      position: relative;
      overflow: auto;
      padding: 20px 22px calc(38px + var(--transcript-scroll-spacer, 0px));
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .message {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 10px 28px rgba(60,44,27,.06);
      display: flex;
      flex-direction: column;
      width: fit-content;
      max-width: min(860px, 92%);
      content-visibility: auto;
      contain-intrinsic-size: 0 160px;
    }
    .transcript.is-programmatic-scroll .message,
    .transcript.is-programmatic-scroll .collapsed-group {
      content-visibility: visible;
    }
    .message.user {
      align-self: flex-end;
      max-width: 80%;
      background: var(--assistant);
    }
    .message-question {
      scroll-margin-top: 16px;
      cursor: pointer;
    }
    .message-question.is-current-question {
      border-color: rgba(143,77,31,.58);
      box-shadow: 0 12px 30px rgba(143,77,31,.12);
    }
    .message.assistant {
      align-self: flex-start;
      width: 100%;
      max-width: 100%;
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }
    .message--final { background: rgba(241,246,234,.92); }
    .message--commentary {
      width: 100%;
      max-width: 100%;
      background: rgba(255,250,242,.88);
      border-style: dashed;
    }
    .message--tool {
      width: 100%;
      max-width: 100%;
      background: rgba(255,255,255,.72);
      font-family: "Cascadia Code","Consolas",monospace;
      contain-intrinsic-size: 0 220px;
    }
    .message-blocks { display: flex; flex-direction: column; gap: 12px; }
    .code-block {
      background: #122033;
      color: #ecf3ff;
      border-radius: 14px;
      overflow: auto;
      padding: 12px 14px;
    }
    .collapsed-group {
      align-self: stretch;
      max-width: min(980px, 96%);
      content-visibility: auto;
      contain-intrinsic-size: 0 96px;
    }
    .collapsed-group summary { cursor: pointer; color: var(--accent); }
    .message-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .message-head-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }
    .role {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .context-label {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border: 1px solid rgba(143,77,31,.22);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(233,213,191,.38);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .message-body {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      font-size: 15px;
    }
    .search-hit {
      background: rgba(255, 214, 102, .55);
      border-radius: 3px;
      padding: 0 1px;
    }
    .code-block .search-hit {
      background: rgba(255, 214, 102, .32);
      outline: 1px solid rgba(255, 236, 158, .42);
    }
    .message-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }
    .message-image-button {
      border: 1px solid rgba(143,77,31,.22);
      border-radius: 10px;
      padding: 4px;
      background: rgba(255,255,255,.68);
      cursor: zoom-in;
    }
    .message-image-thumb {
      display: block;
      max-width: min(220px, 56vw);
      max-height: 180px;
      border-radius: 8px;
      object-fit: contain;
    }
    .image-preview-modal {
      position: fixed;
      inset: 0;
      z-index: 3600;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 54px 18px 22px;
      background: rgba(24,18,12,.72);
      cursor: zoom-out;
    }
    .image-preview-modal img {
      display: block;
      max-width: min(96vw, 1440px);
      max-height: calc(100vh - 92px);
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      box-shadow: 0 24px 76px rgba(0,0,0,.34);
      object-fit: contain;
      cursor: default;
    }
    .image-preview-close {
      position: absolute;
      top: 14px;
      right: 14px;
      border: 1px solid rgba(255,255,255,.42);
      border-radius: 8px;
      padding: 8px 12px;
      background: rgba(255,255,255,.92);
      color: var(--accent);
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
    }
    .image-preview-close:focus-visible {
      outline: 3px solid rgba(255,214,102,.88);
      outline-offset: 2px;
    }
    .message-list {
      margin: 0;
      padding-left: 1.4em;
      line-height: 1.7;
      font-size: 15px;
    }
    .message-table-wrap {
      max-width: 100%;
      overflow: auto;
      border: 1px solid rgba(217,200,172,.72);
      border-radius: 12px;
      background: rgba(255,255,255,.44);
    }
    .message-table {
      width: 100%;
      border-collapse: collapse;
      min-width: max-content;
      font-size: 14px;
      line-height: 1.55;
    }
    .message-table th,
    .message-table td {
      border-bottom: 1px solid rgba(217,200,172,.72);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }
    .message-table tbody tr:last-child td {
      border-bottom: 0;
    }
    .message-table th {
      background: rgba(233,213,191,.35);
      font-weight: 700;
    }
    .message-table .align-center { text-align: center; }
    .message-table .align-right { text-align: right; }
    .message-copy {
      align-self: center;
      flex: none;
      margin-left: auto;
      border: 1px solid rgba(143,77,31,.22);
      border-radius: 999px;
      background: rgba(255,255,255,.5);
      color: var(--accent);
      padding: 5px 10px;
      font: inherit;
      font-size: 12px;
      line-height: 1.2;
      cursor: pointer;
    }
    .message-copy:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,.82);
    }
    .message-blocks > * {
      margin: 0;
    }
    .empty-state {
      padding: 28px;
      color: var(--muted);
      line-height: 1.7;
    }
    .viewer-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .viewer-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }
    .scroll-top {
      position: sticky;
      bottom: 12px;
      align-self: flex-end;
      margin: auto 12px 4px auto;
      width: 42px;
      height: 42px;
      min-height: 42px;
      flex: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(143, 77, 31, .28);
      background: rgba(255,250,242,.72);
      color: var(--accent);
      box-shadow: 0 10px 24px rgba(60,44,27,.12);
      opacity: .72;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .scroll-top:hover {
      opacity: 1;
      border-color: var(--accent);
    }
    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 100;
      max-width: min(320px, calc(100vw - 48px));
      padding: 10px 14px;
      border: 1px solid rgba(143,77,31,.22);
      border-radius: 999px;
      background: rgba(36,27,19,.88);
      color: #fffaf2;
      box-shadow: 0 14px 34px rgba(60,44,27,.20);
      font-size: 13px;
      line-height: 1.4;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: min(720px, calc(100vw - 48px));
      max-height: min(45vh, 320px);
      overflow: auto;
      transition: opacity .16s ease, transform .16s ease;
    }
    .toast--visible {
      opacity: 1;
      transform: translateY(0);
    }
    .toast--error {
      background: rgba(120,43,36,.92);
    }
    .hidden {
      display: none !important;
    }
    @media (min-width: 1280px) {
      .shell {
        grid-template-columns: 300px 400px minmax(0, 1fr);
      }
      .shell.is-workspace-collapsed {
        grid-template-columns: 400px minmax(0, 1fr);
      }
      .shell.is-session-collapsed {
        grid-template-columns: 300px minmax(0, 1fr);
      }
      .shell.is-workspace-collapsed.is-session-collapsed {
        grid-template-columns: minmax(0, 1fr);
      }
    }
    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
        height: auto;
      }
      .shell.is-workspace-collapsed,
      .shell.is-session-collapsed,
      .shell.is-workspace-collapsed.is-session-collapsed {
        grid-template-columns: 1fr;
      }
      .header-main {
        display: block;
        flex-basis: 100%;
        min-width: 100%;
      }
      .stats {
        margin-top: 8px;
      }
      .viewer-actions {
        margin-top: 10px;
      }
      .message,
      .message.user,
      .message.assistant,
      .collapsed-group {
        max-width: 100%;
      }
      .pane + .pane {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
      }
  </style>
</head>
<body>
  <header>
      <div class="header-row">
        <div class="header-main">
  <h1>语迹 <span class="version-badge">{{BUILDER_VERSION}}</span></h1>
        <span class="app-subtitle">AI 对话记录浏览器</span>
        <div class="stats">
          <span class="stat" id="statSessions">会话：{{TOTAL_SESSIONS}}</span>
          <span class="stat" id="statWorkspaces">目录：{{TOTAL_WORKSPACES}}</span>
          <span class="stat" id="statArchived">归档：{{ARCHIVED_COUNT}}</span>
          <span class="stat" id="statImages">含图：{{IMAGE_REF_COUNT}}</span>
          <span class="stat" id="statGenerated" title="生成时间：{{GENERATED_AT}}" aria-label="生成时间：{{GENERATED_AT}}">{{GENERATED_AT}}</span>
        </div>
      </div>
      <label class="source-selector" for="sourceSelect">来源：<select id="sourceSelect" aria-label="选择聊天记录来源"><option value="local-codex">本机 Codex</option></select></label>
      <button type="button" id="refreshButton" class="refresh-btn" onclick="refreshIndex()">刷新</button>
      <button type="button" id="rebuildButton" class="refresh-btn" onclick="rebuildIndex()" title="重新扫描和解析全部聊天记录，耗时可能较长" aria-label="全量重建">全量</button>
      <button type="button" id="globalSidebarToggleButton" class="refresh-btn sidebar-toggle-btn" title="一键收起目录和标题" aria-label="一键收起目录和标题">收起</button>
    </div>
  </header>

  <main class="shell" id="appShell">
    <div id="collapsedControls" class="collapsed-controls" hidden>
      <button type="button" id="expandWorkspacesButton" data-expand-pane="workspaces" hidden>展开目录</button>
      <button type="button" id="expandTitlesButton" data-expand-pane="titles" hidden>展开标题</button>
    </div>
      <section class="pane" id="workspacePane">
        <div class="pane-header">
          <div class="pane-header-row">
            <div class="pane-title-group">
              <p class="pane-title">目录</p>
              <button type="button" id="collapseWorkspacesButton" class="pane-collapse-btn" data-collapse-pane="workspaces" title="收起目录">收起</button>
            </div>
            <div class="header-actions">
              <details class="sort-menu">
                <summary>筛选</summary>
                <div class="sort-panel">
                  <div class="filter-group">
                    <p class="filter-title">provider</p>
                    <div id="workspaceProviderFilter" class="checklist"></div>
                  </div>
                  <div class="filter-group">
                    <p class="filter-title">source</p>
                    <div id="workspaceSourceFilter" class="checklist"></div>
                  </div>
                </div>
              </details>
              <details class="sort-menu">
                <summary>排序</summary>
                <div class="sort-panel">
                  <label>字段
                    <select id="workspaceSortField">
                      <option value="path">路径名字母顺序</option>
                      <option value="updated">最近更新时间</option>
                      <option value="count">会话数量</option>
                    </select>
                  </label>
                  <label>方向
                    <select id="workspaceSortDirection">
                      <option value="asc">升序</option>
                      <option value="desc">降序</option>
                    </select>
                  </label>
                </div>
              </details>
            </div>
          </div>
        <input id="workspaceFilter" type="search" placeholder="筛选工作目录..." oninput="renderWorkspaceList()">
      </div>
      <div id="workspaceList" class="list"></div>
      <button class="scroll-top" type="button" onclick="scrollPaneTop('workspaceList')" title="回到目录列表顶部">↑</button>
    </section>
    <section class="pane" id="sessionPane">
      <div class="pane-header">
        <div class="pane-header-row">
          <div class="pane-title-group">
            <p class="pane-title">标题</p>
            <button type="button" id="collapseTitlesButton" class="pane-collapse-btn" data-collapse-pane="titles" title="收起标题">收起</button>
          </div>
          <div class="header-actions">
          <details class="sort-menu">
            <summary>排序</summary>
            <div class="sort-panel">
              <label>字段
                <select id="sessionSortField">
                  <option value="updated">最近更新时间</option>
                  <option value="title">标题字母顺序</option>
                  <option value="messageCount">消息数量</option>
                </select>
              </label>
              <label>方向
                <select id="sessionSortDirection">
                  <option value="desc">降序</option>
                  <option value="asc">升序</option>
                </select>
              </label>
            </div>
          </details>
          </div>
        </div>
        <input id="sessionFilter" type="search" placeholder="筛选标题、摘要、路径..." oninput="renderSessionList()">
      </div>
      <div id="sessionList" class="list"></div>
      <button class="scroll-top" type="button" onclick="scrollPaneTop('sessionList')" title="回到标题列表顶部">↑</button>
    </section>
      <section class="viewer">
        <div id="viewerHead" class="viewer-head"></div>
      <div id="viewerToolbar" class="reader-toolbar hidden">
        <input id="viewerSearch" type="search" placeholder="搜索...">
        <div class="toolbar-segment toolbar-segment--search" aria-label="搜索范围">
          <button type="button" data-search-scope="all" title="搜索当前来源下全部会话">全部</button>
          <button type="button" data-search-scope="current" title="只搜索当前打开会话">当前</button>
        </div>
        <div class="toolbar-segment toolbar-segment--view" aria-label="显示模式">
          <button type="button" data-view-mode="all">全部</button>
          <button type="button" data-view-mode="questions" title="只看用户提问">提问</button>
        </div>
        <div class="toolbar-segment toolbar-segment--tools" aria-label="会话工具">
          <button type="button" id="questionNext" data-question-nav="bottom" title="到达当前会话底部">底部</button>
          <div id="viewerToolbarActions" class="viewer-actions"></div>
        </div>
      </div>
      <div id="transcript" class="transcript" tabindex="0"></div>
      <div id="replyComposer" class="reply-composer hidden">
        <textarea id="replyInput" rows="2" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" placeholder="输入回复内容。Enter 复制发送，Shift + Enter 换行。"></textarea>
        <div class="reply-composer-actions">
          <button type="button" id="clearReplyButton" class="reply-action reply-action--clear" onclick="clearReplyDraft()">清空</button>
          <button type="button" id="copyReplyCommandButton" class="reply-action reply-action--send" onclick="copyReplyCommand()">复制发送</button>
        </div>
      </div>
      <button class="scroll-top" type="button" onclick="scrollTranscriptTop()" title="回到正文顶部">↑</button>
      </section>
    </main>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    <div id="noteContextMenu" class="note-menu" hidden></div>
    <div id="imagePreviewModal" class="image-preview-modal" role="dialog" aria-modal="true" aria-label="图片预览" hidden>
      <button type="button" id="imagePreviewClose" class="image-preview-close">关闭</button>
      <img id="imagePreviewImage" alt="">
    </div>
    <div id="noteModal" class="note-modal" hidden>
      <div class="note-modal-card" role="dialog" aria-modal="true" aria-labelledby="noteModalTitle">
        <h2 id="noteModalTitle">新建备注</h2>
        <p id="noteContextText" class="note-context"></p>
        <textarea id="noteInput" maxlength="10000" placeholder="输入备注内容，支持多行。Ctrl+Enter 保存，Esc 取消。"></textarea>
        <p id="noteError" class="note-error" aria-live="polite"></p>
        <div class="note-modal-actions">
          <button type="button" data-note-cancel>取消</button>
          <button type="button" data-note-save>保存</button>
        </div>
      </div>
    </div>
    <div id="noteTooltip" class="note-tooltip" hidden>
      <span class="note-tooltip-label">备注</span>
      <div id="noteTooltipBody" class="note-tooltip-body"></div>
    </div>

    <script>
    const INDEX_URL = '{{INDEX_URL}}';
    const SOURCES_API_URL = '/api/sources';
    const SOURCE_DATA_API_URL = '/api/source-data';
    const SEARCH_API_URL = '/api/search';
    const NOTES_API_URL = '/api/notes';
    let APP = null;
    let CURRENT_DETAIL = null;
    const sessionCache = new Map();
    let currentSourceId = 'local-codex';
    let sourceState = {
      selectedSourceId: 'local-codex',
      sources: [{ id: 'local-codex', label: '本机 Codex', type: 'local-codex' }]
    };
    let selectedWorkspaceId = null;
    let selectedSessionKey = null;
  </script>
  <script>
    const appShell = document.getElementById('appShell');
    const workspacePane = document.getElementById('workspacePane');
    const sessionPane = document.getElementById('sessionPane');
    const collapsedControls = document.getElementById('collapsedControls');
    const collapseButtons = {
      workspaces: document.getElementById('collapseWorkspacesButton'),
      titles: document.getElementById('collapseTitlesButton')
    };
    const expandButtons = {
      workspaces: document.getElementById('expandWorkspacesButton'),
      titles: document.getElementById('expandTitlesButton')
    };
    const globalSidebarToggleButton = document.getElementById('globalSidebarToggleButton');
    const sourceSelect = document.getElementById('sourceSelect');
    const workspaceFilterInput = document.getElementById('workspaceFilter');
    const sessionFilterInput = document.getElementById('sessionFilter');
    const workspaceProviderFilter = document.getElementById('workspaceProviderFilter');
    const workspaceSourceFilter = document.getElementById('workspaceSourceFilter');
    const workspaceSortField = document.getElementById('workspaceSortField');
    const workspaceSortDirection = document.getElementById('workspaceSortDirection');
    const sessionSortField = document.getElementById('sessionSortField');
    const sessionSortDirection = document.getElementById('sessionSortDirection');
    const workspaceList = document.getElementById('workspaceList');
    const sessionList = document.getElementById('sessionList');
    const viewerHead = document.getElementById('viewerHead');
    const viewerToolbar = document.getElementById('viewerToolbar');
    const viewerSearchInput = document.getElementById('viewerSearch');
    const viewerToolbarActions = document.getElementById('viewerToolbarActions');
    const transcript = document.getElementById('transcript');
    const replyComposer = document.getElementById('replyComposer');
    const replyInput = document.getElementById('replyInput');
    const clearReplyButton = document.getElementById('clearReplyButton');
    const copyReplyCommandButton = document.getElementById('copyReplyCommandButton');
    const questionNextButton = document.getElementById('questionNext');
    const noteContextMenu = document.getElementById('noteContextMenu');
    const noteModal = document.getElementById('noteModal');
    const noteModalTitle = document.getElementById('noteModalTitle');
    const noteContextText = document.getElementById('noteContextText');
    const noteInput = document.getElementById('noteInput');
    const noteError = document.getElementById('noteError');
    const noteTooltip = document.getElementById('noteTooltip');
    const noteTooltipBody = document.getElementById('noteTooltipBody');
    const imagePreviewModal = document.getElementById('imagePreviewModal');
    const imagePreviewImage = document.getElementById('imagePreviewImage');
    const imagePreviewClose = document.getElementById('imagePreviewClose');
    const SORT_STORAGE_KEY = 'codex-chat-index-sort-v1';
    const MENU_SELECTOR = '.sort-menu';
    const MAX_REPLY_LINES = 20;
    const MAX_NOTE_LENGTH = 10000;
    const CURRENT_SCOPE_SEARCH_DELAY_MS = 160;
    const replyDrafts = new Map();
    let viewerSearchInputIsComposing = false;
    let replyInputIsComposing = false;
    let replyComposerUpdateFrame = 0;
    let replyInputMetrics = null;
    const notesState = {
      notes: new Map(),
      loaded: false,
      available: true
    };
    let activeNoteTarget = null;

    let filterState = {
      provider: ['all'],
      source: ['all']
    };
    let viewerViewMode = 'all';
    let viewerSearchScope = 'all';
    let viewerSearchQuery = '';
    let currentScopeSearchTimer = 0;
    let selectedQuestionKey = null;
    let selectedQuestionKeyIsTemporary = false;
    let pendingQuestionFocus = 'last';
    const sessionProgressAnchors = new Map();
    const MAX_PROGRESS_ANCHORS = 200;
    let progressRestoreToken = 0;
    let globalSearchState = {
      query: '',
      pending: false,
      matchKeys: null,
      requestId: 0,
      timer: 0,
      error: ''
    };

    function getCurrentSourceId() {
      return currentSourceId || 'local-codex';
    }

    function getCurrentSource() {
      const id = getCurrentSourceId();
      const sources = Array.isArray(sourceState.sources) ? sourceState.sources : [];
      return sources.find(source => source && source.id === id) || (APP && APP.source) || sources[0] || { id: 'local-codex', label: '本机 Codex', type: 'local-codex' };
    }

    function isExternalSource() {
      const source = getCurrentSource();
      return !!(source && source.type === 'external-codex-jsonl');
    }

    function buildSourceUrl(url) {
      if (typeof location !== 'undefined' && location.protocol === 'file:') return url;
      return SOURCE_DATA_API_URL + '?sourceId=' + encodeURIComponent(getCurrentSourceId());
    }

    function renderSourceSelect() {
      if (!sourceSelect) return;
      const sources = Array.isArray(sourceState.sources) && sourceState.sources.length
        ? sourceState.sources
        : [{ id: 'local-codex', label: '本机 Codex', type: 'local-codex' }];
      sourceSelect.innerHTML = sources.map(source => {
        const id = String(source.id || 'local-codex');
        const label = String(source.label || id);
        return '<option value="' + escapeHtml(id) + '">' + escapeHtml(label) + '</option>';
      }).join('');
      sourceSelect.value = getCurrentSourceId();
      sourceSelect.disabled = sources.length <= 1;
    }

    async function loadSources() {
      try {
        const response = await fetch(SOURCES_API_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const payload = await response.json();
        if (payload && Array.isArray(payload.sources) && payload.sources.length) {
          sourceState = payload;
          currentSourceId = payload.selectedSourceId || 'local-codex';
        }
      } catch (error) {
        sourceState = {
          selectedSourceId: 'local-codex',
          sources: [{ id: 'local-codex', label: '本机 Codex', type: 'local-codex' }]
        };
        currentSourceId = 'local-codex';
      }
      renderSourceSelect();
    }

    async function saveSelectedSource(sourceId) {
      if (typeof location !== 'undefined' && location.protocol === 'file:') return;
      try {
        await fetch(SOURCES_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ selectedSourceId: sourceId })
        });
      } catch (error) {
      }
    }

    function resetSourceScopedState() {
      saveProgressAnchorForCurrentSession();
      selectedWorkspaceId = null;
      selectedSessionKey = null;
      selectedQuestionKey = null;
      selectedQuestionKeyIsTemporary = false;
      pendingQuestionFocus = 'last';
      progressRestoreToken++;
      CURRENT_DETAIL = null;
      sessionCache.clear();
      notesState.notes = new Map();
      notesState.loaded = false;
      viewerSearchQuery = '';
      viewerSearchScope = 'all';
      if (viewerSearchInput) viewerSearchInput.value = '';
      if (globalSearchState.timer) {
        clearTimeout(globalSearchState.timer);
      }
      globalSearchState = {
        query: '',
        pending: false,
        matchKeys: null,
        requestId: globalSearchState.requestId + 1,
        timer: 0,
        error: ''
      };
    }

    async function loadIndex() {
      let response = await fetch(buildSourceUrl(INDEX_URL), { cache: 'no-store' });
      if (!response.ok && getCurrentSourceId() === 'local-codex') {
        response = await fetch(INDEX_URL, { cache: 'no-store' });
      }
      if (!response.ok) throw new Error('index HTTP ' + response.status);
      APP = await response.json();
      if (!APP || typeof APP !== 'object') APP = {};
      if (!Array.isArray(APP.workspaces)) APP.workspaces = [];
      if (!APP.source) APP.source = getCurrentSource();
      currentSourceId = (APP.source && APP.source.id) || getCurrentSourceId();
      if (sourceState && sourceState.selectedSourceId !== currentSourceId) sourceState.selectedSourceId = currentSourceId;
      renderSourceSelect();
      prepareData();
      selectedWorkspaceId = APP.workspaces[0] ? APP.workspaces[0].id : null;
      selectedSessionKey = APP.workspaces[0] && APP.workspaces[0].sessions[0] ? APP.workspaces[0].sessions[0].key : null;
    }

    async function loadSelectedDetailIfAvailable() {
      const first = getSelectedSession();
      if (!first) return;
      const detail = await loadSessionDetail(first);
      applyLoadedDetail(first, detail);
    }

    async function switchSource(sourceId) {
      const nextSourceId = String(sourceId || 'local-codex');
      if (!nextSourceId || nextSourceId === getCurrentSourceId()) return;
      currentSourceId = nextSourceId;
      if (sourceSelect) sourceSelect.value = nextSourceId;
      await saveSelectedSource(nextSourceId);
      resetSourceScopedState();
      viewerHead.innerHTML = '<div class="empty-state">正在加载来源...</div>';
      transcript.innerHTML = '';
      await loadIndex();
      await loadNotes();
      updateStats();
      refreshFilterMenus();
      renderWorkspaceList(true);
      try {
        await loadSelectedDetailIfAvailable();
      } catch (error) {
        console.warn('来源切换后加载会话详情失败', error);
      }
      renderViewer();
    }

    async function loadSessionDetail(session) {
      const key = getSessionKey(session);
      if (sessionCache.has(key)) {
        return sessionCache.get(key);
      }
      if (!session || !session.detailHref) throw new Error('detail href missing');

      const response = await fetch(session.detailHref, { cache: 'no-store' });
      if (!response.ok) throw new Error('detail HTTP ' + response.status);
      return await response.json();
    }

    function cacheCurrentDetail(key, detail) {
      sessionCache.clear();
      sessionCache.set(key, detail);
      CURRENT_DETAIL = detail;
    }

    function clearCurrentDetail() {
      sessionCache.clear();
      CURRENT_DETAIL = null;
      selectedQuestionKey = null;
      selectedQuestionKeyIsTemporary = false;
      transcript.innerHTML = '';
    }

    function prepareData() {
      (APP.workspaces || []).forEach(workspace => {
        workspace._search = (workspace.cwd || '').toLowerCase();
        workspace.sessions.forEach(session => {
          session._search = [session.title, session.summary, session.path, workspace.cwd].join(' ').toLowerCase();
        });
      });
    }

    function getGlobalSearchQuery() {
      if (viewerSearchScope === 'current') return '';
      return (viewerSearchQuery || '').trim();
    }

    function getGlobalSearchHitSet() {
      return globalSearchState.matchKeys;
    }

    function sessionMatchesGlobalSearch(session) {
      const query = getGlobalSearchQuery();
      if (!query) return true;
      const hits = getGlobalSearchHitSet();
      return !!(hits && hits.has(getSessionKey(session)));
    }

    function getGlobalSearchEmptyText() {
      if (!getGlobalSearchQuery()) return '';
      if (globalSearchState.pending) return '正在搜索所有会话...';
      if (globalSearchState.error) return '搜索失败：' + globalSearchState.error;
      return '没有匹配“' + viewerSearchQuery + '”的内容。';
    }

    function getEmptySourceText() {
      if (APP && APP.needsBuild) return '当前来源尚未扫描，请点击刷新。';
      const source = getCurrentSource();
      if (source && source.type === 'external-codex-jsonl' && APP && !APP.totalSessions) {
        return '当前外部来源还没有可显示的会话，请点击刷新扫描这个来源。';
      }
      return '';
    }

    function scheduleGlobalSearch() {
      const query = getGlobalSearchQuery();
      if (globalSearchState.timer) {
        clearTimeout(globalSearchState.timer);
        globalSearchState.timer = 0;
      }

      if (!query) {
        globalSearchState.query = '';
        globalSearchState.pending = false;
        globalSearchState.matchKeys = null;
        globalSearchState.error = '';
        renderWorkspaceList(true);
        renderViewer();
        return;
      }

      globalSearchState.pending = true;
      globalSearchState.error = '';
      globalSearchState.matchKeys = new Set();
      renderWorkspaceList(true);
      renderViewer();
      globalSearchState.timer = setTimeout(() => {
        void runGlobalSearch(query);
      }, 240);
    }

    function resetGlobalSearchStateForCurrentScope() {
      if (currentScopeSearchTimer) {
        clearTimeout(currentScopeSearchTimer);
        currentScopeSearchTimer = 0;
      }
      if (globalSearchState.timer) {
        clearTimeout(globalSearchState.timer);
        globalSearchState.timer = 0;
      }
      globalSearchState.query = '';
      globalSearchState.pending = false;
      globalSearchState.matchKeys = null;
      globalSearchState.error = '';
      globalSearchState.requestId++;
    }

    function scheduleViewerSearch() {
      if (viewerSearchScope === 'current') {
        if (currentScopeSearchTimer) {
          clearTimeout(currentScopeSearchTimer);
          currentScopeSearchTimer = 0;
        }
        resetGlobalSearchStateForCurrentScope();
        currentScopeSearchTimer = setTimeout(() => {
          currentScopeSearchTimer = 0;
          renderViewer();
        }, CURRENT_SCOPE_SEARCH_DELAY_MS);
        return;
      }
      if (currentScopeSearchTimer) {
        clearTimeout(currentScopeSearchTimer);
        currentScopeSearchTimer = 0;
      }
      scheduleGlobalSearch();
    }

    async function runGlobalSearch(query) {
      const normalizedQuery = String(query || '').trim();
      const requestId = ++globalSearchState.requestId;
      if (!normalizedQuery) {
        scheduleGlobalSearch();
        return;
      }

      try {
        const response = await fetch(SEARCH_API_URL + '?sourceId=' + encodeURIComponent(getCurrentSourceId()) + '&q=' + encodeURIComponent(normalizedQuery), { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const payload = await response.json();
        if (requestId !== globalSearchState.requestId) return;
        if ((getGlobalSearchQuery() || '') !== normalizedQuery) return;
        const keys = Array.isArray(payload.sessionKeys) ? payload.sessionKeys : [];
        globalSearchState.query = normalizedQuery;
        globalSearchState.pending = false;
        globalSearchState.error = '';
        globalSearchState.matchKeys = new Set(keys.map(item => String(item || '')));
        renderWorkspaceList(true);
        renderViewer();
      } catch (error) {
        if (requestId !== globalSearchState.requestId) return;
        globalSearchState.pending = false;
        globalSearchState.error = error && error.message ? error.message : 'unknown error';
        globalSearchState.matchKeys = new Set();
        renderWorkspaceList(true);
        renderViewer();
      }
    }

    function loadSortPrefs() {
      try {
        const raw = localStorage.getItem(SORT_STORAGE_KEY);
        if (!raw) return;
        const prefs = JSON.parse(raw);
        if (Array.isArray(prefs.provider) && prefs.provider.length) filterState.provider = prefs.provider;
        else if (typeof prefs.provider === 'string' && prefs.provider) filterState.provider = [prefs.provider];
        if (Array.isArray(prefs.source) && prefs.source.length) filterState.source = prefs.source;
        else if (typeof prefs.source === 'string' && prefs.source) filterState.source = [prefs.source];
        if (prefs.workspaceField) workspaceSortField.value = prefs.workspaceField;
        if (prefs.workspaceDirection) workspaceSortDirection.value = prefs.workspaceDirection;
        if (prefs.sessionField) sessionSortField.value = prefs.sessionField;
        if (prefs.sessionDirection) sessionSortDirection.value = prefs.sessionDirection;
      } catch (error) {
        console.warn('无法读取排序偏好', error);
      }
    }

    function saveSortPrefs() {
      const prefs = {
        provider: filterState.provider,
        source: filterState.source,
        workspaceField: workspaceSortField.value,
        workspaceDirection: workspaceSortDirection.value,
        sessionField: sessionSortField.value,
        sessionDirection: sessionSortDirection.value
      };
      localStorage.setItem(SORT_STORAGE_KEY, JSON.stringify(prefs));
    }

    function collectUniqueSessionValues(field) {
      const values = new Set();
      if (!APP || !Array.isArray(APP.workspaces)) return [];
      APP.workspaces.forEach(workspace => {
        workspace.sessions.forEach(session => {
          const value = session[field];
          if (value) values.add(value);
        });
      });
      return Array.from(values).sort((a, b) => compareText(a, b));
    }

    function normalizeSelection(values) {
      if (!Array.isArray(values) || !values.length) return ['all'];
      if (values.includes('all')) return ['all'];
      return Array.from(new Set(values));
    }

    function renderChecklist(container, values, selectedValues, key) {
      const normalized = normalizeSelection(selectedValues);
      container.innerHTML = '';
      const allValues = ['all', ...values];
      allValues.forEach(value => {
        const label = document.createElement('label');
        label.className = 'check-item';
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = normalized.includes(value);
        input.dataset.value = value;
        input.dataset.filterKey = key;
        const text = document.createElement('span');
        text.textContent = value;
        label.appendChild(input);
        label.appendChild(text);
        container.appendChild(label);
      });
    }

    function refreshFilterMenus() {
      renderChecklist(
        workspaceProviderFilter,
        collectUniqueSessionValues('modelProvider'),
        filterState.provider,
        'provider'
      );
      renderChecklist(
        workspaceSourceFilter,
        collectUniqueSessionValues('source'),
        filterState.source,
        'source'
      );
    }

    function toggleFilterValue(filterKey, value) {
      let next = [...(filterState[filterKey] || ['all'])];
      if (value === 'all') {
        next = ['all'];
      } else if (next.includes(value)) {
        next = next.filter(item => item !== value && item !== 'all');
      } else {
        next = next.filter(item => item !== 'all');
        next.push(value);
      }
      filterState[filterKey] = normalizeSelection(next);
      saveSortPrefs();
      refreshFilterMenus();
      renderWorkspaceList();
    }

    function matchMultiSelect(value, selectedValues) {
      const normalized = normalizeSelection(selectedValues);
      if (normalized.includes('all')) return true;
      return normalized.includes(value || '');
    }

    function compareText(a, b) {
      return String(a || '').localeCompare(String(b || ''), 'zh-CN', {
        numeric: true,
        sensitivity: 'base'
      });
    }

    function compareNumber(a, b) {
      return (Number(a) || 0) - (Number(b) || 0);
    }

    function compareDate(a, b) {
      return Date.parse(a || '') - Date.parse(b || '');
    }

    function applyDirection(value, direction) {
      return direction === 'desc' ? -value : value;
    }

    function sortWorkspaces(items) {
      const field = workspaceSortField.value;
      const direction = workspaceSortDirection.value;
      return [...items].sort((a, b) => {
        let result = 0;
        if (field === 'updated') {
          result = compareDate(a.workspace.latestUpdatedAt, b.workspace.latestUpdatedAt);
        } else if (field === 'count') {
          result = compareNumber(a.workspace.count, b.workspace.count);
        } else {
          result = compareText(a.workspace.cwd, b.workspace.cwd);
        }
        if (result === 0) result = compareText(a.workspace.cwd, b.workspace.cwd);
        return applyDirection(result, direction);
      });
    }

    function sortSessions(items) {
      const field = sessionSortField.value;
      const direction = sessionSortDirection.value;
      return [...items].sort((a, b) => {
        let result = 0;
        if (field === 'title') {
          result = compareText(a.title, b.title);
        } else if (field === 'messageCount') {
          result = compareNumber(a.messageCount, b.messageCount);
        } else {
          result = compareDate(a.updatedAt, b.updatedAt);
        }
        if (result === 0) result = compareDate(a.updatedAt, b.updatedAt);
        if (result === 0) result = compareText(a.title, b.title);
        return applyDirection(result, direction);
      });
    }

    loadSortPrefs();

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function truncateDisplayText(value, maxLength) {
      const text = String(value || '');
      const limit = Number(maxLength) > 0 ? Number(maxLength) : 300;
      if (text.length <= limit) return text;
      return text.slice(0, limit) + '...';
    }

    function groupSessionsByTitle(sessions) {
      const groups = new Map();
      (sessions || []).forEach(session => {
        const title = session.title || '(未命名标题)';
        if (!groups.has(title)) {
          groups.set(title, {
            title,
            sessions: [],
            latestUpdatedAt: '',
            latestUpdatedLocal: ''
          });
        }
        const group = groups.get(title);
        group.sessions.push(session);
        if (!group.latestUpdatedAt || compareDate(session.updatedAt, group.latestUpdatedAt) > 0) {
          group.latestUpdatedAt = session.updatedAt || '';
          group.latestUpdatedLocal = session.updatedLocal || '';
        }
      });

      return Array.from(groups.values()).sort((a, b) => {
        let result = compareDate(a.latestUpdatedAt, b.latestUpdatedAt);
        if (result === 0) result = compareText(a.title, b.title);
        return result * -1;
      });
    }

    function hasMultipleSessionBranches(group) {
      return !!(group && Array.isArray(group.sessions) && group.sessions.length > 1);
    }

    function formatSessionMeta(session) {
      if (!session) return '';
      const parts = [];
      if (session.updatedLocal) parts.push(session.updatedLocal);
      parts.push('用户 ' + (session.userCount || 0));
      parts.push('回答 ' + (session.assistantCount || 0));
      if (session.archived) parts.push('归档');
      if (session.hasImageReference) parts.push('含图片');
      return parts.join(' · ');
    }

    function formatTitleGroupMeta(group) {
      if (!group) return '';
      if (!hasMultipleSessionBranches(group)) {
        return formatSessionMeta(group.sessions && group.sessions[0]);
      }
      const parts = ['分支 ' + group.sessions.length];
      if (group.latestUpdatedLocal) parts.push('最新 ' + group.latestUpdatedLocal);
      return parts.join(' · ');
    }

    function getVisibleWorkspaces() {
      if (!APP || !Array.isArray(APP.workspaces)) return [];
      const workspaceQuery = workspaceFilterInput.value.trim().toLowerCase();
      const sessionQuery = sessionFilterInput.value.trim().toLowerCase();
      const providerValues = filterState.provider;
      const sourceValues = filterState.source;

      const visible = APP.workspaces.map(workspace => {
        const workspaceMatch = !workspaceQuery || workspace._search.includes(workspaceQuery);
        const filteredSessions = workspace.sessions.filter(session => {
          const sessionMatch = !sessionQuery || session._search.includes(sessionQuery);
          const providerMatch = matchMultiSelect(session.modelProvider, providerValues);
          const sourceMatch = matchMultiSelect(session.source, sourceValues);
          const globalSearchMatch = sessionMatchesGlobalSearch(session);
          return sessionMatch && providerMatch && sourceMatch && globalSearchMatch;
        });

        if (!workspaceMatch || !filteredSessions.length) {
          return null;
        }

        return {
          workspace,
          sessions: sortSessions(filteredSessions)
        };
      }).filter(Boolean);

      return sortWorkspaces(visible);
    }

    function getSessionKey(session) {
      return session && (session.key || session.path || session.id || '');
    }

    function stableHash(value) {
      const text = String(value || '');
      let hash = 2166136261;
      for (let index = 0; index < text.length; index++) {
        hash ^= text.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return (hash >>> 0).toString(16).padStart(8, '0');
    }

    function createGroupNoteTarget(workspace, group) {
      const cwd = (workspace && workspace.cwd) || '';
      const title = (group && group.title) || '';
      const sourceId = typeof getCurrentSourceId === 'function' ? getCurrentSourceId() : 'local-codex';
      return {
        key: 'group:' + sourceId + ':' + stableHash(cwd) + ':' + stableHash(title),
        type: 'group',
        sourceId,
        workspace: cwd,
        title,
        path: '',
        sessionId: '',
        context: title
      };
    }

    function createSessionNoteTarget(workspace, group, session) {
      const identity = (session && (session.path || session.key || session.id)) || '';
      const sourceId = typeof getCurrentSourceId === 'function' ? getCurrentSourceId() : 'local-codex';
      return {
        key: 'session:' + sourceId + ':' + stableHash(identity),
        type: 'session',
        sourceId,
        workspace: (workspace && workspace.cwd) || '',
        title: (group && group.title) || (session && session.title) || '',
        path: (session && session.path) || '',
        sessionId: (session && session.id) || '',
        context: (session && (session.path || session.title || session.id)) || ''
      };
    }

    function getNote(key) {
      return notesState.notes.get(String(key || '')) || null;
    }

    function applyNoteMetadata(element, target, fallbackTitle) {
      if (!element || !target) return;
      const note = getNote(target.key);
      element.dataset.noteKey = target.key || '';
      element.dataset.noteType = target.type || '';
      element.dataset.noteWorkspace = target.workspace || '';
      element.dataset.noteTitle = target.title || '';
      element.dataset.notePath = target.path || '';
      element.dataset.noteSessionId = target.sessionId || '';
      element.dataset.noteContext = target.context || fallbackTitle || '';
      if (note && note.note) {
        element.removeAttribute('title');
        element.dataset.noteText = note.note;
        element.classList.toggle('has-note', true);
      } else {
        element.setAttribute('title', fallbackTitle || '');
        delete element.dataset.noteText;
        element.classList.toggle('has-note', false);
      }
    }

    async function loadNotes() {
      try {
        const response = await fetch(NOTES_API_URL + '?sourceId=' + encodeURIComponent(getCurrentSourceId()), { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const payload = await response.json();
        const notes = payload && payload.notes && typeof payload.notes === 'object' ? payload.notes : {};
        notesState.notes = new Map(Object.entries(notes));
        notesState.loaded = true;
        notesState.available = true;
      } catch (error) {
        notesState.notes = new Map();
        notesState.loaded = true;
        notesState.available = false;
        console.warn('备注读取失败', error);
      }
    }

    function noteTargetFromElement(element) {
      if (!element || !element.dataset || !element.dataset.noteKey) return null;
      return {
        key: element.dataset.noteKey || '',
        type: element.dataset.noteType || '',
        sourceId: getCurrentSourceId(),
        workspace: element.dataset.noteWorkspace || '',
        title: element.dataset.noteTitle || '',
        path: element.dataset.notePath || '',
        sessionId: element.dataset.noteSessionId || '',
        context: element.dataset.noteContext || ''
      };
    }

    function closeNoteMenu() {
      if (noteContextMenu) {
        noteContextMenu.hidden = true;
        noteContextMenu.innerHTML = '';
      }
      activeNoteTarget = null;
    }

    const PANE_COLLAPSE_STORAGE_KEYS = {
      workspaces: 'Yuji.sidebarCollapsed.workspaces',
      titles: 'Yuji.sidebarCollapsed.titles'
    };

    function readBooleanStorage(key) {
      try {
        return localStorage.getItem(key) === 'true';
      } catch (error) {
        return false;
      }
    }

    function getStoredPaneCollapseState() {
      return {
        workspaces: readBooleanStorage(PANE_COLLAPSE_STORAGE_KEYS.workspaces),
        titles: readBooleanStorage(PANE_COLLAPSE_STORAGE_KEYS.titles)
      };
    }

    let paneCollapseState = getStoredPaneCollapseState();
    syncPaneCollapseState();

    function setSidebarCollapsedState(nextState, options) {
      const settings = Object.assign({ persist: true, preserveScroll: false }, options || {});
      const savedScrollTop = settings.preserveScroll && typeof transcript !== 'undefined' && transcript
        ? transcript.scrollTop
        : null;
      paneCollapseState = {
        workspaces: !!nextState.workspaces,
        titles: !!nextState.titles
      };
      if (settings.persist) {
        try {
          localStorage.setItem(PANE_COLLAPSE_STORAGE_KEYS.workspaces, paneCollapseState.workspaces ? 'true' : 'false');
          localStorage.setItem(PANE_COLLAPSE_STORAGE_KEYS.titles, paneCollapseState.titles ? 'true' : 'false');
        } catch (error) {
        }
      }
      syncPaneCollapseState();
      if (savedScrollTop !== null && typeof requestAnimationFrame === 'function') {
        requestAnimationFrame(() => {
          if (typeof transcript !== 'undefined' && transcript) transcript.scrollTop = savedScrollTop;
        });
      }
    }

    function setPaneCollapsed(pane, collapsed) {
      if (pane !== 'workspaces' && pane !== 'titles') return;
      const nextState = Object.assign({}, paneCollapseState);
      nextState[pane] = !!collapsed;
      setSidebarCollapsedState(nextState);
    }

    function toggleAllSidebars() {
      const allCollapsed = !!paneCollapseState.workspaces && !!paneCollapseState.titles;
      setSidebarCollapsedState({
        workspaces: !allCollapsed,
        titles: !allCollapsed
      }, { preserveScroll: true });
    }

    function syncPaneCollapseState() {
      const workspaceCollapsed = !!paneCollapseState.workspaces;
      const sessionCollapsed = !!paneCollapseState.titles;
      const allCollapsed = workspaceCollapsed && sessionCollapsed;
      if (typeof appShell !== 'undefined' && appShell) {
        appShell.classList.toggle('is-workspace-collapsed', workspaceCollapsed);
        appShell.classList.toggle('is-session-collapsed', sessionCollapsed);
      }
      if (typeof workspacePane !== 'undefined' && workspacePane) workspacePane.classList.toggle('is-collapsed', workspaceCollapsed);
      if (typeof sessionPane !== 'undefined' && sessionPane) sessionPane.classList.toggle('is-collapsed', sessionCollapsed);
      if (typeof collapseButtons !== 'undefined') {
        if (collapseButtons.workspaces) collapseButtons.workspaces.hidden = workspaceCollapsed;
        if (collapseButtons.titles) collapseButtons.titles.hidden = sessionCollapsed;
      }
      if (typeof expandButtons !== 'undefined') {
        if (expandButtons.workspaces) expandButtons.workspaces.hidden = !workspaceCollapsed;
        if (expandButtons.titles) expandButtons.titles.hidden = !sessionCollapsed;
      }
      if (typeof collapsedControls !== 'undefined' && collapsedControls) collapsedControls.hidden = !(workspaceCollapsed || sessionCollapsed);
      if (typeof globalSidebarToggleButton !== 'undefined' && globalSidebarToggleButton) {
        const label = allCollapsed ? '展开' : '收起';
        const title = allCollapsed ? '一键展开目录和标题' : '一键收起目录和标题';
        globalSidebarToggleButton.textContent = label;
        globalSidebarToggleButton.title = title;
        globalSidebarToggleButton.setAttribute('aria-label', title);
      }
    }

    function positionFloatingPanel(panel, x, y) {
      if (!panel) return;
      panel.hidden = false;
      panel.style.left = '0px';
      panel.style.top = '0px';
      const rect = panel.getBoundingClientRect();
      const margin = 10;
      let left = x + 10;
      let top = y + 10;
      if (left + rect.width + margin > window.innerWidth) {
        left = Math.max(margin, x - rect.width - 10);
      }
      if (top + rect.height + margin > window.innerHeight) {
        top = Math.max(margin, y - rect.height - 10);
      }
      panel.style.left = left + 'px';
      panel.style.top = top + 'px';
    }

    function openNoteMenu(event, target) {
      if (!noteContextMenu || !target) return;

      hideNoteTooltip();

      const actions = hasNote
        ? [
            ['edit', '编辑备注'],
            ['delete', '删除备注']
          ]
        : [
            ['new', '新建备注']
          ];
      noteContextMenu.innerHTML = actions.map(action => '<button type="button" data-note-action="' + action[0] + '">' + action[1] + '</button>').join('');
      positionFloatingPanel(noteContextMenu, event.clientX || 0, event.clientY || 0);

    function openNoteModal(target) {
      if (!noteModal || !noteInput || !target) return;

      const existing = getNote(target.key);
      noteModalTitle.textContent = existing ? '编辑备注' : '新建备注';
      noteContextText.textContent = target.context || target.title || target.path || target.key;

    async function saveActiveNote() {
      if (!activeNoteTarget || !noteInput) return;
      const note = String(noteInput.value || '').trim();
      if (!note) {
        if (noteError) noteError.textContent = '备注不能为空；如果不需要备注，请使用删除备注。';
        return;
      }
      if (note.length > MAX_NOTE_LENGTH) {
        if (noteError) noteError.textContent = '备注太长，最多 ' + MAX_NOTE_LENGTH + ' 字。';
        return;
      }
      try {
        const response = await fetch(NOTES_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.assign({}, activeNoteTarget, { sourceId: getCurrentSourceId(), note }))
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload.ok) throw new Error(payload.error || ('HTTP ' + response.status));
        notesState.notes.set(activeNoteTarget.key, payload.item || Object.assign({}, activeNoteTarget, { note }));
        notesState.available = true;
        closeNoteModal();
        renderSessionList(true);
        showToast('备注已保存');
      } catch (error) {
        if (noteError) noteError.textContent = '保存失败：' + (error.message || '未知错误');
        showToast('保存备注失败：请通过 Open-CodexChatIndex.cmd 打开以编辑备注。', { tone: 'error', duration: 3200 });
      }
    }

      try {

          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: target.key, sourceId: getCurrentSourceId() })
        });
        const payload = await response.json().catch(() => ({}));

        notesState.notes.delete(target.key);
        closeNoteMenu();
        renderSessionList(true);
        showToast('备注已删除');
      } catch (error) {

    function showNoteTooltip(event, target) {
      const note = target && getNote(target.key);
      if (!note || !note.note || !noteTooltip || !noteTooltipBody) return;
      noteTooltipBody.textContent = note.note;

    function moveNoteTooltip(event) {
      if (!noteTooltip || noteTooltip.hidden) return;
      positionFloatingPanel(noteTooltip, event.clientX || 0, event.clientY || 0);

    function hideNoteTooltip() {
      if (!noteTooltip) return;
