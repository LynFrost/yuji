    function updateStats() {
      if (!APP) return;
      document.getElementById('statSessions').textContent = '会话：' + APP.totalSessions;
      document.getElementById('statWorkspaces').textContent = '目录：' + APP.totalWorkspaces;
      document.getElementById('statArchived').textContent = '归档：' + APP.archived;
      document.getElementById('statImages').textContent = '含图：' + APP.imageReferences;
      const generated = document.getElementById('statGenerated');
      generated.textContent = APP.generatedAt || '';
      generated.title = '生成时间：' + (APP.generatedAt || '');
      generated.setAttribute('aria-label', '生成时间：' + (APP.generatedAt || ''));
    }

    function collectSessionMap(data) {
      const map = new Map();
      ((data && data.workspaces) || []).forEach(workspace => {
        workspace.sessions.forEach(session => {
          map.set(getSessionKey(session), {
            workspace: workspace.cwd,
            session,
            signature: sessionSignature(session)
          });
        });
      });
      return map;
    }

    function sessionSignature(session) {
      return [
        session.updatedLocal || '',
        session.userCount || 0,
        session.assistantCount || 0,
        session.detailHref || ''
      ].join('|');
    }

    function flattenSessions(data) {
      const sessions = [];
      ((data && data.workspaces) || []).forEach(workspace => {
        workspace.sessions.forEach(session => {
          sessions.push({ workspace: workspace.cwd, session });
        });
      });
      return sessions;
    }

    function collectWorkspaceSet(data) {
      return new Set(((data && data.workspaces) || []).map(workspace => workspace.cwd || '(未知工作目录)'));
    }

    function countUniqueWorkspaces(items) {
      return new Set(items.map(item => item.workspace || '(未知工作目录)')).size;
    }

    function groupChangesByWorkspace(items) {
      const buckets = new Map();
      items.forEach(item => {
        const key = item.workspace || '(未知工作目录)';
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(item);
      });

      const rows = Array.from(buckets.entries()).map(([workspace, changes]) => ({
        workspace,
        changes
      }));

      rows.sort((a, b) => {
        if (b.changes.length !== a.changes.length) return b.changes.length - a.changes.length;
        return a.workspace.localeCompare(b.workspace, 'zh-CN');
      });

      return rows;
    }

    function formatGroupedChangeMessage(title, items, mapper) {
      if (!items.length) return '';
      const groups = groupChangesByWorkspace(items);
      const lines = [title + ' ' + items.length + ' 条：', ''];

      groups.slice(0, 8).forEach(group => {
        lines.push('【' + group.workspace + '】');
        group.changes.slice(0, 4).forEach(change => {
          lines.push(mapper(change));
        });
        if (group.changes.length > 4) {
          lines.push('  其余 ' + (group.changes.length - 4) + ' 条未展开');
        }
        lines.push('');
      });

      if (groups.length > 8) {
        lines.push('其余 ' + (groups.length - 8) + ' 个工作目录未在弹窗中展开。');
      }

      return lines.join('\n').trim();
    }

    function setRefreshButtonLoading(button, isLoading, loadingText, idleText) {
      if (!button) return;
      button.disabled = isLoading;
      button.textContent = isLoading ? loadingText : idleText;
      if (button.classList) {
        if (isLoading) button.classList.add('is-loading');
        else button.classList.remove('is-loading');
      }
      if (isLoading && typeof button.setAttribute === 'function') {
        button.setAttribute('aria-busy', 'true');
      }
      if (!isLoading && typeof button.removeAttribute === 'function') {
        button.removeAttribute('aria-busy');
      }
    }

    function formatRefreshSummary(mode, payload, added, updated) {
      const label = mode === 'current' ? '快刷' : (mode === 'rebuild' ? '全量重建' : '刷新');
      const parts = [];
      const notice = String(payload.notice || '').trim();
      const parsed = Number(payload.parsedCount || 0);
      const reused = Number(payload.reusedCount || 0);
      const scanned = Number(payload.scannedCount || 0);
      const elapsedMs = Number(payload.elapsedMs || 0);
      const elapsedText = elapsedMs ? '，用时 ' + (elapsedMs / 1000).toFixed(1) + ' 秒' : '';
      if (notice) parts.push(notice);
      parts.push(label + '完成：扫描 ' + scanned + ' 条，解析 ' + parsed + ' 条，复用 ' + reused + ' 条' + elapsedText + '。');
      if (added.length) parts.push('新增聊天记录 ' + added.length + ' 条。');
      if (updated.length) parts.push('已有聊天更新 ' + updated.length + ' 条。');
      if (!added.length && !updated.length) parts.push('没有发现新增或变化的聊天记录。');
      return parts.join('\n');
    }

    function buildSelectedSessionRequestBody() {
      const session = getSelectedSession();
      return session && session.path ? { path: session.path } : null;
    }

    function bodyWithSourceId(body) {
      const sourceId = typeof getCurrentSourceId === 'function' ? getCurrentSourceId() : 'local-codex';
      return Object.assign({}, body || {}, { sourceId });
    }

    async function runRefreshRequest(mode, options) {
      const settings = Object.assign({
        endpoint: '/api/refresh',
        buttonId: 'refreshButton',
        idleText: '刷新',
        loadingText: '刷新中...',
        body: null,
        preNotice: ''
      }, options || {});
      if (runRefreshRequest._running) return;
      runRefreshRequest._running = true;
      const button = typeof document !== 'undefined' ? document.getElementById(settings.buttonId) : null;
      if (settings.preNotice) {
        showToast(settings.preNotice, { duration: 1800 });
      }
      setRefreshButtonLoading(button, true, settings.loadingText, settings.idleText);
      try {
        const currentApp = APP && Array.isArray(APP.workspaces) ? APP : { workspaces: [] };
        const beforeMap = collectSessionMap(currentApp);
        const beforeWorkspaceSet = collectWorkspaceSet(currentApp);
        const previousWorkspaceId = selectedWorkspaceId;
        const previousSessionKey = selectedSessionKey;
        const refreshAnchor = typeof captureProgressAnchor === 'function' ? captureProgressAnchor(getSelectedSession()) : null;
        if (refreshAnchor && typeof saveProgressAnchor === 'function') saveProgressAnchor(refreshAnchor);
        const refreshRestoreToken = typeof progressRestoreToken !== 'undefined' ? ++progressRestoreToken : 0;
        const previousWorkspace = currentApp.workspaces.find(workspace => workspace.id === previousWorkspaceId);
        const previousWorkspacePath = previousWorkspace ? previousWorkspace.cwd : '';
        const request = {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyWithSourceId(settings.body))
        };
        const response = await fetch(settings.endpoint, request);
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const payload = await response.json();
        if (!payload.ok) throw new Error(payload.error || 'refresh failed');

        APP = payload.data;
        if (!APP || typeof APP !== 'object') APP = { workspaces: [] };
        if (!Array.isArray(APP.workspaces)) APP.workspaces = [];
        const refreshedSourceId = (APP.source && APP.source.id) || (typeof getCurrentSourceId === 'function' ? getCurrentSourceId() : 'local-codex');
        if (typeof currentSourceId !== 'undefined') currentSourceId = refreshedSourceId;
        if (typeof sourceState !== 'undefined' && sourceState) sourceState.selectedSourceId = refreshedSourceId;
        if (typeof renderSourceSelect === 'function') renderSourceSelect();
        prepareData();
        if (typeof getGlobalSearchQuery === 'function' && typeof runGlobalSearch === 'function' && getGlobalSearchQuery()) {
          await runGlobalSearch(getGlobalSearchQuery());
        }
        updateStats();
        refreshFilterMenus();
        sessionCache.clear();
        CURRENT_DETAIL = null;

        const flattened = flattenSessions(APP);
        const afterWorkspaceSet = collectWorkspaceSet(APP);
        const added = flattened.filter(item => !beforeMap.has(getSessionKey(item.session)));
        const updated = flattened.filter(item => {
          const before = beforeMap.get(getSessionKey(item.session));
          return before && before.signature !== sessionSignature(item.session);
        });
        const nextWorkspace = APP.workspaces.find(workspace => workspace.cwd === previousWorkspacePath);
        const previousSession = nextWorkspace && nextWorkspace.sessions.find(session => getSessionKey(session) === previousSessionKey);
        selectedWorkspaceId = nextWorkspace ? nextWorkspace.id : (APP.workspaces[0] ? APP.workspaces[0].id : null);
        selectedSessionKey = previousSession ? previousSessionKey : (APP.workspaces[0] && APP.workspaces[0].sessions[0] ? APP.workspaces[0].sessions[0].key : null);
        if (!previousSession) {
          selectedQuestionKey = null;
          selectedQuestionKeyIsTemporary = false;
        }
        renderWorkspaceList(true);

        const selectedAfterRefresh = getSelectedSession();
        if (selectedAfterRefresh) {
          try {
            const detail = payload.currentDetail && detailMatchesSession(selectedAfterRefresh, payload.currentDetail)
              ? payload.currentDetail
              : await loadSessionDetail(selectedAfterRefresh);
            if (applyLoadedDetail(selectedAfterRefresh, detail)) {
              renderViewer();
              if (refreshAnchor && typeof restoreProgressAnchor === 'function' && selectedAfterRefresh && getSessionKey(selectedAfterRefresh) === refreshAnchor.sessionKey) {
                restoreProgressAnchor(refreshAnchor, { token: refreshRestoreToken, behavior: 'auto' });
              } else {
                requestAnimationFrame(() => focusTranscriptForQuestionNavigation());
              }
            }
          } catch (detailError) {
            console.warn('刷新后加载会话详情失败', detailError);
          }
        }

        const message = formatRefreshSummary(mode, payload, added, updated);
        showToast(message, { duration: 3200 });
      } catch (error) {
        showToast('刷新失败：' + (error.message || '未知错误') + '\n请确认页面是通过 Open-CodexChatIndex.cmd 打开的。', { tone: 'error', duration: 3600 });
      } finally {
        setRefreshButtonLoading(button, false, settings.loadingText, settings.idleText);
        runRefreshRequest._running = false;
      }
    }

    async function refreshIndex() {
      return runRefreshRequest('incremental', {
        endpoint: '/api/refresh',
        buttonId: 'refreshButton',
        idleText: '刷新',
        loadingText: '刷新中...',
        body: buildSelectedSessionRequestBody()
      });
    }

    async function refreshCurrentSession() {
      const session = getSelectedSession();
      if (!session || !session.path) {
        showToast('当前没有可快刷的会话。', { tone: 'error', duration: 2200 });
        return;
      }
      return runRefreshRequest('current', {
        endpoint: '/api/refresh-current',
        buttonId: 'refreshCurrentButton',
        idleText: '快刷',
        loadingText: '快刷中...',
        body: { path: session.path }
      });
    }

    async function rebuildIndex() {
      return runRefreshRequest('rebuild', {
        endpoint: '/api/rebuild',
        buttonId: 'rebuildButton',
        idleText: '全量',
        loadingText: '重建中...',
        body: buildSelectedSessionRequestBody(),
        preNotice: '全量重建会重新扫描和解析全部聊天记录，耗时可能较长。'
      });
    }

    function focusTranscriptForQuestionNavigation() {
      if (!selectedQuestionKey || !transcript || typeof transcript.focus !== 'function') return false;
      transcript.focus({ preventScroll: true });
      return true;
    }

    function scrollPaneTop(id) {
      const el = document.getElementById(id);
      if (el) el.scrollTo({ top: 0, behavior: 'smooth' });
      if (id === 'transcript') {
        scrollTranscriptTop();
      }
    }

    function scrollTranscriptTop() {
      if (focusFirstQuestion({ scroll: false })) {
        focusTranscriptForQuestionNavigation();
      }
      if (!transcript || typeof transcript.scrollTo !== 'function') return;
      cancelQuestionScrollAnimation();
      const token = ++activeQuestionScrollToken;
      lockTranscriptLayoutForProgrammaticScroll();
      let stableFrames = 0;
      let attempts = 0;
      const minAttempts = 8;
      const maxAttempts = 36;
      const settleUnlockedTop = () => {
        let unlockedStableFrames = 0;
        let unlockedAttempts = 0;
        const minUnlockedAttempts = 6;
        const maxUnlockedAttempts = 24;
        const settle = () => {
          if (token !== activeQuestionScrollToken) return;
          transcript.scrollTo({ top: 0, behavior: 'auto' });
          unlockedStableFrames = (transcript.scrollTop || 0) <= 2 ? unlockedStableFrames + 1 : 0;
          unlockedAttempts++;
          if ((unlockedAttempts >= minUnlockedAttempts && unlockedStableFrames >= 3) || unlockedAttempts >= maxUnlockedAttempts) {
            return;
          }
          requestAnimationFrame(settle);
        };
        requestAnimationFrame(settle);
      };
      const followTop = () => {
        if (token !== activeQuestionScrollToken) return;
        transcript.scrollTo({ top: 0, behavior: 'auto' });
        stableFrames = (transcript.scrollTop || 0) <= 2 ? stableFrames + 1 : 0;
        attempts++;
        if ((attempts >= minAttempts && stableFrames >= 3) || attempts >= maxAttempts) {
          unlockTranscriptLayoutForProgrammaticScroll();
          settleUnlockedTop();
          return;
        }
        requestAnimationFrame(followTop);
      };
      requestAnimationFrame(followTop);
    }

    function scrollTranscriptBottom() {
      if (focusLastQuestion({ scroll: false })) {
        focusTranscriptForQuestionNavigation();
      }
      if (!transcript || typeof transcript.scrollTo !== 'function') return;
      cancelQuestionScrollAnimation();
      const token = ++activeQuestionScrollToken;
      lockTranscriptLayoutForProgrammaticScroll();
      let stableFrames = 0;
      let attempts = 0;
      const minAttempts = 12;
      const maxAttempts = 48;
      const settleUnlockedBottom = () => {
        let unlockedStableFrames = 0;
        let unlockedAttempts = 0;
        const minUnlockedAttempts = 8;
        const maxUnlockedAttempts = 36;
        const settle = () => {
          if (token !== activeQuestionScrollToken) return;
          const bottomTop = Math.max(0, transcript.scrollHeight);
          transcript.scrollTo({ top: bottomTop, behavior: 'auto' });
          const bottomGap = Math.max(0, transcript.scrollHeight - transcript.clientHeight - transcript.scrollTop);
          unlockedStableFrames = bottomGap <= 2 ? unlockedStableFrames + 1 : 0;
          unlockedAttempts++;
          if ((unlockedAttempts >= minUnlockedAttempts && unlockedStableFrames >= 4) || unlockedAttempts >= maxUnlockedAttempts) {
            return;
          }
          requestAnimationFrame(settle);
        };
        requestAnimationFrame(settle);
      };
      const followBottom = () => {
        if (token !== activeQuestionScrollToken) return;
        const bottomTop = Math.max(0, transcript.scrollHeight);
        transcript.scrollTo({ top: bottomTop, behavior: 'auto' });
        const bottomGap = Math.max(0, transcript.scrollHeight - transcript.clientHeight - transcript.scrollTop);
        stableFrames = bottomGap <= 2 ? stableFrames + 1 : 0;
        attempts++;
        if ((attempts >= minAttempts && stableFrames >= 4) || attempts >= maxAttempts) {
          unlockTranscriptLayoutForProgrammaticScroll();
          settleUnlockedBottom();
          return;
        }
        requestAnimationFrame(followBottom);
      };
      requestAnimationFrame(followBottom);
    }

    function ensureSelection() {
      const visible = getVisibleWorkspaces();
      if (!visible.length) {
        return;
      }

      const workspaceVisible = visible.find(item => item.workspace.id === selectedWorkspaceId);
      if (!workspaceVisible) {
        if (getGlobalSearchQuery()) {
          return;
        }
        selectedWorkspaceId = visible[0].workspace.id;
      }

      const currentWorkspace = visible.find(item => item.workspace.id === selectedWorkspaceId) || visible[0];
      if (!currentWorkspace.sessions.length) {
        return;
      }

      const sessionVisible = currentWorkspace.sessions.find(item => getSessionKey(item) === selectedSessionKey);
      if (!sessionVisible) {
        if (getGlobalSearchQuery()) {
          return;
        }
        selectedSessionKey = currentWorkspace.sessions[0].key;
      }
    }

    function isDetailLoadedForSession(session) {
      if (!session || !CURRENT_DETAIL) return false;
      if (CURRENT_DETAIL.path && session.path) return CURRENT_DETAIL.path === session.path;
      if (CURRENT_DETAIL.id && session.id) return CURRENT_DETAIL.id === session.id;
      return false;
    }

    function detailMatchesSession(session, detail) {
      if (!session || !detail) return false;
      if (detail.path && session.path) return detail.path === session.path;
      if (detail.id && session.id) return detail.id === session.id;
      return false;
    }

    function applyLoadedDetail(session, detail) {
      if (!detailMatchesSession(session, detail)) return false;
      if (getSessionKey(session) !== selectedSessionKey) return false;
      cacheCurrentDetail(getSessionKey(session), detail);
      return true;
    }

    function getCurrentDetailEvents() {
      if (!CURRENT_DETAIL || !Array.isArray(CURRENT_DETAIL.events)) return [];
      return CURRENT_DETAIL.events.filter(event => {
        return event && ['user', 'assistant_commentary', 'assistant_final', 'tool', 'system'].includes(event.kind);
      });
    }

    function getQuestionKey(session, eventIndex) {
      return getSessionKey(session) + '::question::' + String(eventIndex);
    }

    function getWorkspaceForSession(session) {
      if (!APP || !Array.isArray(APP.workspaces)) return null;
      if (!session && selectedWorkspaceId) {
        return APP.workspaces.find(workspace => workspace.id === selectedWorkspaceId) || null;
      }
      const sessionKey = getSessionKey(session);
      return APP.workspaces.find(workspace => {
        return workspace && Array.isArray(workspace.sessions) && workspace.sessions.some(item => getSessionKey(item) === sessionKey);
      }) || null;
    }

    function getProgressAnchorMapKey(sourceId, sessionKey, workspacePath) {
      return [sourceId || '', workspacePath || '', sessionKey || ''].join('::');
    }

    function getProgressAnchorKeyForSession(session) {
      if (!session) return '';
      const workspace = getWorkspaceForSession(session);
      return getProgressAnchorMapKey(getCurrentSourceId(), getSessionKey(session), workspace ? (workspace.cwd || '') : '');
    }

    function normalizeQuestionText(value) {
      return String(value || '').replace(/\s+/g, ' ').trim().slice(0, 120);
    }

    function hashQuestionText(value) {
      const text = normalizeQuestionText(value);
      let hash = 0x811c9dc5;
      for (let index = 0; index < text.length; index++) {
        hash ^= text.charCodeAt(index);
        hash = Math.imul(hash, 0x01000193);
      }
      return (hash >>> 0).toString(16).padStart(8, '0').slice(0, 8);
    }

    function getQuestionOffsetFromTranscript(questionKey) {
      if (!questionKey || !transcript || typeof transcript.getBoundingClientRect !== 'function') return 0;
      const element = findQuestionElement(questionKey);
      if (!element || typeof element.getBoundingClientRect !== 'function') return 0;
      const transcriptRect = transcript.getBoundingClientRect();
      const elementRect = element.getBoundingClientRect();
      return Math.round(elementRect.top - transcriptRect.top);
    }

    function saveProgressAnchor(anchor) {
      if (!anchor || !anchor.sourceId || !anchor.sessionKey || !anchor.questionKey) return false;
      const key = getProgressAnchorMapKey(anchor.sourceId, anchor.sessionKey, anchor.workspacePath || '');
      sessionProgressAnchors.delete(key);
      sessionProgressAnchors.set(key, anchor);
      while (sessionProgressAnchors.size > MAX_PROGRESS_ANCHORS) {
        const oldestKey = sessionProgressAnchors.keys().next().value;
        sessionProgressAnchors.delete(oldestKey);
      }
      return true;
    }

    function getProgressAnchorForSession(session) {
      const key = getProgressAnchorKeyForSession(session);
      return key ? (sessionProgressAnchors.get(key) || null) : null;
    }

    function captureProgressAnchor(session) {
      const targetSession = session || getSelectedSession();
      if (!targetSession || !selectedQuestionKey || selectedQuestionKeyIsTemporary) return null;
      const questions = getQuestionEvents();
      const questionIndex = questions.findIndex(event => event.questionKey === selectedQuestionKey);
      if (questionIndex < 0) return null;
      const question = questions[questionIndex];
      const workspace = getWorkspaceForSession(targetSession);
      return {
        sourceId: getCurrentSourceId(),
        workspacePath: workspace ? (workspace.cwd || '') : '',
        sessionKey: getSessionKey(targetSession),
        questionKey: question.questionKey,
        questionIndex,
        questionTextHash: question.questionTextHash || hashQuestionText(question.rawText || question.summary || ''),
        offsetFromQuestionTop: getQuestionOffsetFromTranscript(question.questionKey),
        viewMode: viewerViewMode,
        searchScope: viewerSearchScope,
        searchQuery: viewerSearchQuery,
        capturedAt: Date.now()
      };
    }

    function saveProgressAnchorForCurrentSession() {
      const anchor = captureProgressAnchor(getSelectedSession());
      if (!anchor) return false;
      const saved = saveProgressAnchor(anchor);
      if (saved) progressRestoreToken++;
      return saved;
    }

    function anchorMatchesCurrentSession(anchor, session) {
      const targetSession = session || getSelectedSession();
      if (!anchor || !targetSession) return false;
      if (anchor.sourceId !== getCurrentSourceId()) return false;
      if (anchor.sessionKey !== getSessionKey(targetSession)) return false;
      const workspace = getWorkspaceForSession(targetSession);
      if (anchor.workspacePath && workspace && workspace.cwd && anchor.workspacePath !== workspace.cwd) return false;
      return true;
    }

    function resolveQuestionKeyFromAnchor(anchor, session) {
      const targetSession = session || getSelectedSession();
      if (!anchorMatchesCurrentSession(anchor, targetSession)) return null;
      const questions = getQuestionEvents();
      if (!questions.length) return null;

      if (anchor.questionKey && questions.some(event => event.questionKey === anchor.questionKey)) {
        return anchor.questionKey;
      }

      if (anchor.questionTextHash) {
        const hashMatch = questions.find(event => event.questionTextHash === anchor.questionTextHash);
        if (hashMatch) return hashMatch.questionKey;
      }

      const index = Number(anchor.questionIndex);
      if (Number.isFinite(index) && index >= 0) {
        if (index < questions.length) return questions[index].questionKey;
        const previousIndex = Math.min(questions.length - 1, Math.floor(index));
        if (previousIndex >= 0 && questions[previousIndex]) return questions[previousIndex].questionKey;
        const nextQuestion = questions.find(Boolean);
        if (nextQuestion) return nextQuestion.questionKey;
      }

      return null;
    }

    function restoreProgressAnchor(anchor, options) {
      const settings = Object.assign({ behavior: 'auto' }, options || {});
      if (settings.token && settings.token !== progressRestoreToken) return false;
      if (!anchorMatchesCurrentSession(anchor, getSelectedSession())) return false;
      const resolvedKey = resolveQuestionKeyFromAnchor(anchor, getSelectedSession());
      if (!resolvedKey) return false;
      setSelectedQuestionKey(resolvedKey, { scroll: false, persistAnchor: false });
      let attempts = 0;
      let stableFrames = 0;
      const maxAttempts = 8;
      const scroll = () => {
        if (settings.token && settings.token !== progressRestoreToken) return;
        if (!anchorMatchesCurrentSession(anchor, getSelectedSession())) return;
        const scrolled = scrollToQuestion(resolvedKey, settings.behavior || 'auto');
        attempts++;
        const element = findQuestionElement(resolvedKey);
        let settled = !!scrolled && !element;
        if (scrolled && element && transcript && typeof element.getBoundingClientRect === 'function' && typeof transcript.getBoundingClientRect === 'function') {
          const elementTop = element.getBoundingClientRect().top - transcript.getBoundingClientRect().top;
          stableFrames = Math.abs(elementTop - 16) <= 4 ? stableFrames + 1 : 0;
          settled = stableFrames >= 2;
        } else if (scrolled && element) {
          settled = true;
        }
        if (settled || attempts >= maxAttempts || typeof requestAnimationFrame !== 'function') {
          focusTranscriptForQuestionNavigation();
          return;
        }
        requestAnimationFrame(scroll);
      };
      if (typeof requestAnimationFrame === 'function') requestAnimationFrame(scroll);
      else scroll();
      return true;
    }

    function restoreCurrentProgressAnchorIfReadable() {
      if (viewerSearchQuery.trim()) return false;
      const anchor = getProgressAnchorForSession(getSelectedSession());
      if (!anchor) return false;
      return restoreProgressAnchor(anchor, { token: progressRestoreToken, behavior: 'auto' });
    }

    function getCurrentDetailEventsWithKeys() {
      const session = getSelectedSession();
      return getCurrentDetailEvents().map((event, eventIndex) => {
        if (!event || event.kind !== 'user') return event;
        return Object.assign({}, event, {
          questionKey: getQuestionKey(session, eventIndex),
          questionIndex: 0,
          questionTextHash: hashQuestionText(event.rawText || event.summary || '')
        });
      });
    }

    function getQuestionEvents() {
      return getCurrentDetailEventsWithKeys().filter(event => event && event.kind === 'user').map((event, questionIndex) => {
        return Object.assign({}, event, { questionIndex });
      });
    }

    function syncSelectedQuestionKey(preferredPosition, options) {
      const settings = options || {};
      const questions = getQuestionEvents();
      if (!questions.length) {
        selectedQuestionKey = null;
        selectedQuestionKeyIsTemporary = false;
        return questions;
      }

      if (preferredPosition === 'last') {
        selectedQuestionKey = questions[questions.length - 1].questionKey;
        selectedQuestionKeyIsTemporary = false;
      } else if (preferredPosition === 'first') {
        selectedQuestionKey = questions[0].questionKey;
        selectedQuestionKeyIsTemporary = false;
      } else if (!selectedQuestionKey || !questions.some(event => event.questionKey === selectedQuestionKey)) {
        const anchor = settings.useProgressAnchor ? getProgressAnchorForSession(getSelectedSession()) : null;
        const restoredKey = anchor ? resolveQuestionKeyFromAnchor(anchor, getSelectedSession()) : null;
        selectedQuestionKey = restoredKey || (settings.allowFallbackFirst === false ? null : questions[0].questionKey);
        selectedQuestionKeyIsTemporary = !restoredKey && settings.temporaryFallback === true;
      } else if (!settings.keepTemporary) {
        selectedQuestionKeyIsTemporary = false;
      }
      return questions;
    }

    function eventMatchesView(event) {
      if (viewerViewMode === 'questions') return event.kind === 'user';
      return true;
    }

    function getSearchTerms(query) {
      return String(query || '')
        .trim()
        .toLowerCase()
        .split(/\s+/)
        .filter(Boolean);
    }

    function eventMatchesSearch(event, query) {
      const terms = getSearchTerms(query);
      if (!terms.length) return true;
      const haystack = [event.summary, event.rawText, event.toolName, event.status].join(' ').toLowerCase();
      return terms.every(term => haystack.includes(term));
    }

    function highlightMatchesInElement(root, terms) {
      const activeTerms = Array.from(new Set((terms || []).filter(Boolean)));
      if (!root || !activeTerms.length || typeof document === 'undefined' || typeof NodeFilter === 'undefined') return;
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const textNodes = [];
      while (walker.nextNode()) {
        const node = walker.currentNode;
        if (!node || !node.nodeValue) continue;
        if (node.parentElement && node.parentElement.closest('mark,script,style')) continue;
        textNodes.push(node);
      }

      textNodes.forEach(node => {
        const source = node.nodeValue || '';
        const lower = source.toLowerCase();
        const ranges = [];
        activeTerms.forEach(term => {
          let index = lower.indexOf(term);
          while (index >= 0) {
            ranges.push({ start: index, end: index + term.length });
            index = lower.indexOf(term, index + Math.max(1, term.length));
          }
        });
        if (!ranges.length) return;

        ranges.sort((a, b) => (a.start - b.start) || (b.end - b.start) - (a.end - a.start));
        const merged = [];
        ranges.forEach(range => {
          const last = merged[merged.length - 1];
          if (!last || range.start >= last.end) {
            merged.push(range);
          } else if (range.end > last.end) {
            last.end = range.end;
          }
        });

        const fragment = document.createDocumentFragment();
        let cursor = 0;
        merged.forEach(range => {
          if (range.start > cursor) {
            fragment.appendChild(document.createTextNode(source.slice(cursor, range.start)));
          }
          const mark = document.createElement('mark');
          mark.className = 'search-hit';
          mark.textContent = source.slice(range.start, range.end);
          fragment.appendChild(mark);
          cursor = range.end;
        });
        if (cursor < source.length) {
          fragment.appendChild(document.createTextNode(source.slice(cursor)));
        }
        if (node.parentNode) {
          node.parentNode.replaceChild(fragment, node);
        }
      });
    }

    function getVisibleDetailEvents() {
      const query = viewerSearchQuery.trim().toLowerCase();
      const events = getCurrentDetailEventsWithKeys();
      if (!query) return events.filter(event => eventMatchesView(event));
      if (viewerViewMode === 'questions') {
        return events.filter(event => eventMatchesView(event) && eventMatchesSearch(event, query));
      }

      const output = [];
      const includedQuestions = new Set();
      let previousQuestion = null;
      events.forEach(event => {
        if (!event) return;
        if (event.kind === 'user') {
          previousQuestion = event;
        }
        if (!eventMatchesView(event) || !eventMatchesSearch(event, query)) return;

        if (event.kind === 'user') {
          output.push(event);
          if (event.questionKey) includedQuestions.add(event.questionKey);
          return;
        }

        if (previousQuestion) {
          const questionKey = previousQuestion.questionKey || '';
          if (!questionKey || !includedQuestions.has(questionKey)) {
            output.push(Object.assign({}, previousQuestion, { isSearchContext: true }));
            if (questionKey) includedQuestions.add(questionKey);
          }
        }
        output.push(event);
      });
      return output;
    }

    function getEventLabel(event) {
      if (!event) return '内容';
      if (event.kind === 'user') return '用户';
      if (event.kind === 'assistant_commentary') return 'Assistant Commentary';
      if (event.kind === 'assistant_final') return 'Assistant';
      if (event.kind === 'tool') return '工具';
      if (event.kind === 'system') return '系统';
      return event.role || event.kind || '内容';
    }

    function getEventText(event) {
      if (!event) return '';
      if (event.kind === 'tool' || event.kind === 'system') {
        return event.summary || event.rawText || '';
      }
      return event.rawText || event.summary || '';
    }

    function preventTitleButtonMouseFocus(event) {
      if (!event || event.detail === 0) return;
      event.preventDefault();
    }

    function syncSessionListSelection() {
      const activeKey = selectedSessionKey || '';
      sessionList.querySelectorAll('.title-group-head').forEach(button => {
        const keys = String(button.dataset.sessionKeys || '').split('|');
        button.classList.toggle('active', !!activeKey && keys.includes(activeKey));
      });
      sessionList.querySelectorAll('.session-btn').forEach(button => {
        button.classList.toggle('active', !!activeKey && button.dataset.sessionKey === activeKey);
      });

    function renderWorkspaceList(skipViewerSync) {

      if (!visible.length) {

      }

      visible.forEach(item => {

        btn.onclick = async () => {

    function renderSessionList(skipViewerSync) {
      ensureSelection();
      const visible = getVisibleWorkspaces();
      sessionList.innerHTML = '';

      if (!selectedWorkspaceId) {
        sessionList.innerHTML = '<div class="empty-state">' + escapeHtml(getGlobalSearchEmptyText() || '先选择一个工作目录。') + '</div>';
        renderViewer();

      }

      const current = visible.find(item => item.workspace.id === selectedWorkspaceId);

        renderViewer();
        return;
      }

      if (!current.sessions.length) {
        sessionList.innerHTML = '<div class="empty-state">这个工作目录下没有匹配的聊天标题。</div>';
        selectedSessionKey = null;
        clearCurrentDetail();
        renderViewer();
        return;
      }

      groupSessionsByTitle(current.sessions).forEach(group => {
        const groupNode = document.createElement('section');
        groupNode.className = 'title-group';

        const groupHead = document.createElement('button');
        groupHead.type = 'button';
        const groupActive = group.sessions.some(session => getSessionKey(session) === selectedSessionKey);
        groupHead.className = 'title-group-head' + (groupActive ? ' active' : '');
        groupHead.dataset.sessionKeys = group.sessions.map(item => getSessionKey(item)).join('|');
        applyNoteMetadata(groupHead, createGroupNoteTarget(current.workspace, group), group.title);
        groupHead.innerHTML =
          '<span class="title-group-title">' + escapeHtml(truncateDisplayText(group.title, 300)) + '</span>' +
          '<span class="title-group-meta">' + escapeHtml(formatTitleGroupMeta(group)) + '</span>';
        groupHead.onmousedown = preventTitleButtonMouseFocus;
        groupHead.onclick = async () => {
          await selectSessionFromTitlePane(group.sessions[0]);
        };
        groupNode.appendChild(groupHead);

        if (hasMultipleSessionBranches(group)) {
          const sessionRows = document.createElement('div');
          sessionRows.className = 'title-group-sessions';
          group.sessions.forEach(session => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'session-btn' + (getSessionKey(session) === selectedSessionKey ? ' active' : '');
            btn.dataset.sessionKey = getSessionKey(session);
            applyNoteMetadata(btn, createSessionNoteTarget(current.workspace, group, session), session.path || session.title || '');
            btn.innerHTML = '<span class="session-meta">' + escapeHtml(formatSessionMeta(session)) + '</span>';
            btn.onmousedown = preventTitleButtonMouseFocus;
            btn.onclick = async () => {
              await selectSessionFromTitlePane(session);
            };
            sessionRows.appendChild(btn);
          });
          groupNode.appendChild(sessionRows);
        }
        sessionList.appendChild(groupNode);
      });

      if (skipViewerSync) {
        renderViewer();
        return;
      }

      const session = getSelectedSession();
      if (session && !isDetailLoadedForSession(session)) {
        void selectSession(session);
        return;
      }
      renderViewer();
    }

    function getSelectedSession() {
      if (!APP || !selectedWorkspaceId || !selectedSessionKey) return null;
      const workspace = APP.workspaces.find(item => item.id === selectedWorkspaceId);
      if (!workspace) return null;
      return workspace.sessions.find(item => getSessionKey(item) === selectedSessionKey) || null;
    }

    async function copyText(value) {
      const text = String(value || '');
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return;
        }
      } catch (e) {
      }

      const area = document.createElement('textarea');
      area.value = text;
      document.body.appendChild(area);
      area.select();
      try {
        const copied = document.execCommand('copy');
        if (!copied) throw new Error('copy command failed');
      } finally {
        area.remove();
      }
    }

    function buildResumeCommand(session) {
      if (typeof isExternalSource === 'function' && isExternalSource()) return '';
      if (!session || !APP) return '';
      const cwd = getSessionCommandCwd(session);
      if (!session.id || !cwd) return '';
      if (isLocalClaudeSource()) {
        return 'Set-Location -LiteralPath ' + quotePowerShellSingle(cwd) + '; claude --resume ' + quotePowerShellSingle(session.id);
      }
      return 'codex resume ' + session.id + ' -C ' + JSON.stringify(cwd);
    }

    function escapePowerShellDoubleQuoted(value) {
      const psEscape = String.fromCharCode(96);
      const dq = String.fromCharCode(34);
      const cr = String.fromCharCode(13);
      const lf = String.fromCharCode(10);
      return String(value || '')
        .split(psEscape).join(psEscape + psEscape)
        .split(dq).join(psEscape + dq)
        .split(cr + lf).join(psEscape + 'n')
        .split(lf).join(psEscape + 'n')
        .split(cr).join(psEscape + 'n');
    }

    function getCurrentSourceType() {
      const source = typeof getCurrentSource === 'function' ? getCurrentSource() : null;
      return source && source.type ? String(source.type) : '';
    }

    function isLocalClaudeSource() {
      return getCurrentSourceType() === 'local-claude';
    }

    function quotePowerShellSingle(value) {
      return "'" + String(value || '').replace(/'/g, "''") + "'";
    }

    function getSessionCommandCwd(session) {
      const workspace = APP && APP.workspaces ? APP.workspaces.find(item => item.id === selectedWorkspaceId) : null;
      const workspaceCwd = String((workspace && workspace.cwd) || '');
      const sessionCwd = String((session && session.cwd) || '');
      return isLocalClaudeSource() ? (sessionCwd || workspaceCwd) : (workspaceCwd || sessionCwd);
    }

    function buildReplyResumeCommand(session, replyText) {
      if (typeof isExternalSource === 'function' && isExternalSource()) return '';
      if (!session || !APP) return '';
      const cwd = getSessionCommandCwd(session);
      const reply = String(replyText || '');
      if (!session.id || !cwd || !reply.trim()) return '';
      if (isLocalClaudeSource()) {
        return 'Set-Location -LiteralPath ' + quotePowerShellSingle(cwd) + '; claude -p --resume ' + quotePowerShellSingle(session.id) + ' ' + quotePowerShellSingle(reply);
      }
      return 'codex -C "' + escapePowerShellDoubleQuoted(cwd) + '" resume ' + session.id + ' "' + escapePowerShellDoubleQuoted(reply) + '"';
    }

    function canBuildReplyResumeCommand(session, replyText) {
      if (typeof isExternalSource === 'function' && isExternalSource()) return false;
      if (!session || !APP) return false;
      const cwd = getSessionCommandCwd(session);
      return !!(session.id && cwd && String(replyText || '').trim());
    }

    function getReplyDraftKey(session) {
      return session ? getSessionKey(session) : '';
    }

    function saveReplyDraftValueOnly() {
      if (!replyInput) return;
      const session = getSelectedSession();
      const key = getReplyDraftKey(session);
      if (!key) return;
      replyDrafts.set(key, replyInput.value || '');
    }

    function scheduleReplyComposerUpdate() {
      if (replyComposerUpdateFrame) return;
      const callback = () => {
        replyComposerUpdateFrame = 0;
        updateReplyComposerState();
      };
      if (typeof requestAnimationFrame === 'function') {
        replyComposerUpdateFrame = requestAnimationFrame(callback);
        return;
      }
      replyComposerUpdateFrame = 1;
      callback();
    }

    function persistReplyDraft() {
      saveReplyDraftValueOnly();
      if (replyInputIsComposing) return;
      scheduleReplyComposerUpdate();
    }

    function resetReplyInputMetrics() {
      replyInputMetrics = null;
    }

    function getReplyInputMetrics() {
      if (replyInputMetrics) return replyInputMetrics;
      const computed = typeof window !== 'undefined' && window.getComputedStyle && replyInput ? window.getComputedStyle(replyInput) : null;
      const lineHeight = computed ? (parseFloat(computed.lineHeight) || 26) : 26;
      const borderTop = computed ? (parseFloat(computed.borderTopWidth) || 0) : 0;
      const borderBottom = computed ? (parseFloat(computed.borderBottomWidth) || 0) : 0;
      const paddingTop = computed ? (parseFloat(computed.paddingTop) || 0) : 0;
      const paddingBottom = computed ? (parseFloat(computed.paddingBottom) || 0) : 0;
      replyInputMetrics = {
        lineHeight,
        maxHeight: Math.round(lineHeight * MAX_REPLY_LINES + paddingTop + paddingBottom + borderTop + borderBottom)
      };
      return replyInputMetrics;
    }

    function autoResizeReplyInput() {
      if (!replyInput || !replyInput.style) return;
      const metrics = getReplyInputMetrics();
      replyInput.style.height = 'auto';
      const scrollHeight = replyInput.scrollHeight || metrics.maxHeight;
      const nextHeight = Math.min(scrollHeight, metrics.maxHeight);
      replyInput.style.height = nextHeight + 'px';
      replyInput.style.overflowY = scrollHeight > metrics.maxHeight ? 'auto' : 'hidden';
    }

    function updateReplyComposerState() {
      if (!replyComposer || !replyInput) return;
      const session = getSelectedSession();
      if (!session || (typeof isExternalSource === 'function' && isExternalSource())) {
        replyComposer.classList.add('hidden');
        return;
      }
      replyComposer.classList.remove('hidden');
      const text = String(replyInput.value || '');
      const canSend = canBuildReplyResumeCommand(session, text);
      if (copyReplyCommandButton) copyReplyCommandButton.disabled = !canSend;
      if (clearReplyButton) clearReplyButton.disabled = !text.length;
      autoResizeReplyInput();
    }

    function syncReplyComposer() {
      if (!replyComposer || !replyInput) return;
      const session = getSelectedSession();
      if (!session || (typeof isExternalSource === 'function' && isExternalSource())) {
        replyComposer.classList.add('hidden');
        replyInput.value = '';
        resetReplyInputMetrics();
        updateReplyComposerState();
        return;
      }
      const key = getReplyDraftKey(session);
      replyInput.value = key && replyDrafts.has(key) ? (replyDrafts.get(key) || '') : '';
      resetReplyInputMetrics();
      updateReplyComposerState();
    }

    function clearReplyDraft() {
      if (!replyInput) return;
      const session = getSelectedSession();
      const key = getReplyDraftKey(session);
      replyInput.value = '';
      if (key) replyDrafts.set(key, '');
      resetReplyInputMetrics();
      updateReplyComposerState();
      if (typeof replyInput.focus === 'function') {
        replyInput.focus();
      }
    }

    async function copyReplyCommand() {
      if (typeof isExternalSource === 'function' && isExternalSource()) {
        showToast('外部来源不支持生成发送命令。', { tone: 'error', duration: 2400 });
        return;
      }
      const session = getSelectedSession();
      if (!session || !session.path) {
        showToast('当前没有可发送的会话路径。', { tone: 'error', duration: 2200 });
        return;
      }
      if (!session.id) {
        showToast('当前会话缺少 SESSION id，无法生成发送命令。', { tone: 'error', duration: 2200 });
        return;
      }
      const reply = replyInput ? String(replyInput.value || '') : '';
      if (!reply.trim()) {
        showToast('请输入回复内容。', { tone: 'error', duration: 2200 });
        return;
      }
      const command = buildReplyResumeCommand(session, reply);
      if (!command) {
        showToast(isLocalClaudeSource() ? '当前 Claude 会话缺少可恢复命令所需信息。' : '当前会话缺少发送命令所需信息。', { tone: 'error', duration: 2200 });
        return;
      }
      try {
        await copyText(command);
        showToast('已复制发送命令。', { duration: 2200 });
      } catch (error) {
        showToast('复制发送命令失败，请手动复制。', { tone: 'error', duration: 2200 });
      }
    }

    async function copyResumeCommand() {
      if (typeof isExternalSource === 'function' && isExternalSource()) {
        showToast('外部来源不支持复制 SESSION。', { tone: 'error', duration: 2400 });
        return;
      }
      const session = getSelectedSession();
      if (!session) {
        showToast('当前没有选中的会话。', { tone: 'error', duration: 2200 });
        return;
      }
      const command = buildResumeCommand(session);
      if (!command) {
        showToast(isLocalClaudeSource() ? '当前 Claude 会话缺少可恢复命令所需信息。' : '当前会话缺少 session id 或工作目录，无法生成命令。', { tone: 'error', duration: 2200 });
        return;
      }
      try {
        await copyText(command);
        showToast('已复制 SESSION：\n' + command, { duration: 2600 });
      } catch (error) {
        showToast('复制 SESSION 失败，请手动复制', { tone: 'error', duration: 2200 });
      }
    }

    async function copyCurrentPath() {
      const session = getSelectedSession();
      if (!session || !session.path) {
        showToast('当前没有可复制的会话路径。', { tone: 'error', duration: 2200 });
        return;
      }
      try {
        await copyText(session.path);
        showToast('已复制路径：\n' + session.path, { duration: 2600 });
      } catch (error) {

      }

    function sanitizeFileName(value) {
      return String(value || 'session')
        .replace(/[<>:"/\\|?*]+/g, '_')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function buildMarkdown(detail) {
      const lines = [];
      lines.push('# ' + (detail.title || '未命名会话'));
      lines.push('');
      lines.push('- 路径：' + (detail.path || ''));
      lines.push('- 创建：' + (detail.createdLocal || ''));
      lines.push('- 更新：' + (detail.updatedLocal || ''));
      lines.push('');
      lines.push('---');
      lines.push('');

      (detail.events || []).forEach(event => {
        const label = event.kind === 'user' ? '用户' :
          event.kind === 'assistant_final' ? 'Assistant' :
          event.kind === 'assistant_commentary' ? '过程' :
          event.kind === 'system' ? '系统' :
          '工具';
        lines.push('## ' + label + ' (' + (event.timestampLocal || '') + ')');
        lines.push('');
        if (event.kind === 'tool') {
          if (event.summary) {
            lines.push(event.summary);
          }
          if (event.rawText) {
            if (event.summary) lines.push('');
            lines.push(event.rawText);
          }
          if (!event.summary && !event.rawText) {
            lines.push('');
          }
        } else {
          lines.push(event.rawText || event.summary || '');
          if (event.images && event.images.length) {
            if (event.rawText || event.summary) lines.push('');
            lines.push('[图片 ' + event.images.length + ' 张，已在网页中内联显示]');
          }
        }
        lines.push('');
      });

      return lines.join('\n');
    }

    function exportSelectedMarkdown() {
      const session = getSelectedSession();
      if (!session) {
        alert('当前没有选中的会话。');
        return;
      }

      const detail = isDetailLoadedForSession(session) ? CURRENT_DETAIL : null;
      if (!detail) {
        alert('当前会话详情尚未加载完成，请稍后再试。');
        return;
      }

      const stem = (detail.path || session.path || '').split(/[\\/]/).pop() || session.id || 'session';
      const fileName = sanitizeFileName((session.title || '会话') + '__' + stem.replace(/\.jsonl$/i, '') + '.md');
      const markdown = buildMarkdown(detail);
      const blob = new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    const messageCopyTexts = new Map();

      toast.className = 'toast toast--visible' + (isError ? ' toast--error' : '');
      const duration = options && options.duration ? options.duration : 1600;
      toastTimer = setTimeout(() => {

    function isExplicitQuoteBlock(text) {
      const lines = String(text || '').split('\n').map(line => line.trimEnd());
      const meaningfulLines = lines.filter(line => line.trim());
      return meaningfulLines.length > 0 && meaningfulLines.every(line => /^> ?/.test(line));
    }

    function detectExplicitListType(text) {
      const meaningfulLines = String(text || '')
        .split('\n')
        .map(line => line.trim())
        .filter(line => line);
      if (!meaningfulLines.length) return '';

      if (meaningfulLines.every(line => /^- /.test(line))) return 'bullet';
      if (meaningfulLines.every(line => /^\d+\. /.test(line))) return 'numbered';
      return '';
    }

    function splitMarkdownTableRow(line) {
      const trimmed = String(line || '').trim();
      if (!trimmed.startsWith('|') || !trimmed.endsWith('|')) return null;
      const cells = trimmed.slice(1, -1).split('|').map(cell => cell.trim());
      return cells.length >= 2 ? cells : null;
    }

    function getMarkdownTableAlignment(cell) {
      if (!/^:?-{3,}:?$/.test(cell)) return false;
      if (/^:-+:$/.test(cell)) return 'center';
      if (/^-+:$/.test(cell)) return 'right';
      return 'left';
    }

    function parseMarkdownTable(text) {
      const lines = String(text || '')
        .split('\n')
        .map(line => line.trim())
        .filter(line => line);
      if (lines.length < 3) return null;

      const headers = splitMarkdownTableRow(lines[0]);
      const separators = splitMarkdownTableRow(lines[1]);
      if (!headers || !separators || headers.length !== separators.length || headers.some(cell => !cell)) return null;

      const alignments = separators.map(getMarkdownTableAlignment);
      if (alignments.some(alignment => alignment === false)) return null;

      const rows = [];
      for (let index = 2; index < lines.length; index++) {
        const row = splitMarkdownTableRow(lines[index]);
        if (!row || row.length !== headers.length) return null;
        rows.push(row);
      }

      if (!rows.length) return null;
      return { headers, alignments, rows };
    }

    function parseDeterministicBlocks(text) {
      const source = String(text || '').replace(/\r\n/g, '\n');
      const blocks = [];
      const parts = source.split(/```/);

      for (let index = 0; index < parts.length; index++) {
        if (index % 2 === 1) {
          const lines = parts[index].split('\n');
          const language = (lines.shift() || '').trim();
          blocks.push({ type: 'code', language, text: lines.join('\n').trimEnd() });
          continue;
        }

        parts[index].split(/\n{2,}/).forEach(chunk => {
          const value = chunk.trim();
          if (!value) return;
          const table = parseMarkdownTable(value);
          if (table) blocks.push(Object.assign({ type: 'table' }, table));
          else if (isExplicitQuoteBlock(value)) blocks.push({ type: 'quote', text: value.replace(/^> ?/gm, '') });
          else if (detectExplicitListType(value)) blocks.push({ type: 'list', text: value });
          else blocks.push({ type: 'paragraph', text: value });
        });
      }

      return blocks;
    }

    function renderStrongTextSegment(segment) {
      const source = String(segment || '');
      let output = '';
      let index = 0;
      while (index < source.length) {
        const open = source.indexOf('**', index);
        if (open < 0) {
          output += escapeHtml(source.slice(index));
          break;
        }
        const close = source.indexOf('**', open + 2);
        const newline = source.indexOf('\n', open + 2);
        if (close < 0 || (newline >= 0 && newline < close)) {
          output += escapeHtml(source.slice(index));
          break;
        }
        const content = source.slice(open + 2, close);
        if (!content) {
          output += escapeHtml(source.slice(index, close + 2));
          index = close + 2;
          continue;
        }
        output += escapeHtml(source.slice(index, open));
        output += '<strong>' + escapeHtml(content) + '</strong>';
        index = close + 2;
      }
      return output;
    }

    function renderInlineText(text) {
      return String(text || '').split(/(`[^`\n]+`)/g).map(segment => {
        if (/^`[^`\n]+`$/.test(segment)) {
          return '<code>' + escapeHtml(segment.slice(1, -1)) + '</code>';
        }
        return renderStrongTextSegment(segment);
      }).join('');
    }

    function renderListBlock(text) {
      const listType = detectExplicitListType(text);
      if (!listType) return '<div class="message-body">' + escapeHtml(text) + '</div>';

      const tagName = listType === 'numbered' ? 'ol' : 'ul';
      const itemPattern = listType === 'numbered' ? /^\d+\. / : /^- /;
      const lines = String(text || '')
        .split('\n')
        .map(line => line.trim())
        .filter(line => line);
      const firstNumberedLine = listType === 'numbered' ? (lines.find(line => /^\d+\. /.test(line)) || '') : '';
      const startMatch = firstNumberedLine.match(/^(\d+)\. /);
      const startNumber = startMatch ? Number(startMatch[1]) : 1;
      const startAttr = listType === 'numbered' && Number.isSafeInteger(startNumber) && startNumber >= 0 && startNumber !== 1
        ? ' start="' + String(startNumber) + '"'
        : '';
      const items = lines.map(line => line.replace(itemPattern, ''));

      return '<' + tagName + startAttr + ' class="message-list">' + items.map(item => '<li>' + renderInlineText(item) + '</li>').join('') + '</' + tagName + '>';
    }

    function renderTableCell(tagName, value, alignment) {
      const className = alignment === 'center' || alignment === 'right' ? ' class="align-' + alignment + '"' : '';
      return '<' + tagName + className + '>' + renderInlineText(value) + '</' + tagName + '>';
    }

    function renderTableBlock(block) {
      const headerHtml = '<tr>' + block.headers.map((cell, index) => renderTableCell('th', cell, block.alignments[index])).join('') + '</tr>';
      const rowsHtml = block.rows.map(row => {
        return '<tr>' + row.map((cell, index) => renderTableCell('td', cell, block.alignments[index])).join('') + '</tr>';
      }).join('');
      return '<div class="message-table-wrap"><table class="message-table"><thead>' + headerHtml + '</thead><tbody>' + rowsHtml + '</tbody></table></div>';
    }

    function renderDeterministicMarkdown(text) {
      const blocks = parseDeterministicBlocks(text || '');
      return blocks.map(block => {
        if (block.type === 'code') return '<pre class="code-block"><code>' + escapeHtml(block.text) + '</code></pre>';
        if (block.type === 'quote') return '<blockquote>' + renderInlineText(block.text) + '</blockquote>';
        if (block.type === 'list') return renderListBlock(block.text);
        if (block.type === 'table') return renderTableBlock(block);
        return '<p class="message-body">' + renderInlineText(block.text) + '</p>';
      }).join('');
    }

    const lazyDetailRenderers = new Map();
    let lazyDetailSerial = 0;

    function resetLazyDetailRenderers() {
      lazyDetailRenderers.clear();
      lazyDetailSerial = 0;
    }

    function renderToolRawBlock(text) {
      const content = String(text || '');
      if (!content) return '';
      return '<pre class="code-block"><code>' + escapeHtml(content) + '</code></pre>';
    }

    function renderLazyDetails(className, summaryHtml, bodyRenderer, options) {
      const id = 'lazy-detail-' + (++lazyDetailSerial);
      lazyDetailRenderers.set(id, bodyRenderer);
      const shouldOpen = !!(options && options.autoExpandGroups);
      return '<details class="' + className + '"' + (shouldOpen ? ' open' : '') + '><summary>' + summaryHtml + '</summary><div class="message-blocks" data-lazy-detail-id="' + id + '" data-lazy-detail-body></div></details>';
    }

    function renderProcessDetailItem(item) {
      if (!item) return '';
      if (item.kind === 'assistant_commentary') {
        return '<div class="message message--commentary"><div class="message-head"><span class="role">过程</span><span>' + escapeHtml(item.timestampLocal || '') + '</span></div><div class="message-blocks">' + renderDeterministicMarkdown(item.rawText || '') + '</div></div>';
      }
      if (item.kind === 'system') {
        return '<div class="message message--tool"><div class="message-head"><span class="role">系统</span><span>' + escapeHtml(item.timestampLocal || '') + '</span></div><div class="message-blocks">' + renderDeterministicMarkdown(item.rawText || item.summary || '') + '</div></div>';
      }
      return '<div class="message message--tool"><div class="message-head"><span class="role">' + escapeHtml(item.toolName || 'tool') + '</span><span>' + escapeHtml(item.status || '') + '</span></div><div class="message-blocks">' + (item.summary ? '<p class="message-body">' + renderInlineText(item.summary) + '</p>' : '') + renderToolRawBlock(item.rawText || '') + '</div></div>';
    }

    function summarizeProcessItems(items, options) {
      const summaryCounts = {
        process: 0,
        tool: 0,
        system: 0
      };
      const query = options && options.searchQuery ? String(options.searchQuery).trim().toLowerCase() : '';

      items.forEach(item => {
        if (!item) return;
        if (item.kind === 'assistant_commentary') summaryCounts.process++;
        else if (item.kind === 'system') summaryCounts.system++;
        else summaryCounts.tool++;
      });

      const summaryParts = ['执行过程', items.length + ' 条'];
      if (summaryCounts.process) summaryParts.push('过程 ' + summaryCounts.process);
      if (summaryCounts.tool) summaryParts.push('工具 ' + summaryCounts.tool);
      if (summaryCounts.system) summaryParts.push('系统 ' + summaryCounts.system);
      if (query) summaryParts.push('命中 ' + items.length);
      return '执行过程（' + summaryParts.slice(1).join(' · ') + '）';
    }

    function renderEvent(event, options) {
      const copyButton = renderCopyButton(event);
      if (event.kind === 'user') {
        const questionKey = (options && options.questionKey) || event.questionKey || '';
        const dataAttrs = questionKey ? ' data-question-key="' + escapeHtml(questionKey) + '" tabindex="0"' : '';
        const activeClass = options && options.isCurrentQuestion ? ' is-current-question' : '';
        const contextLabel = event.isSearchContext ? '<span class="context-label">上下文提问</span>' : '';
        return '<article class="message user message-question' + activeClass + '"' + dataAttrs + '><div class="message-head"><span class="message-head-main"><span class="role">用户</span>' + contextLabel + '<span>' + escapeHtml(event.timestampLocal || '') + '</span></span>' + copyButton + '</div><div class="message-blocks">' + renderDeterministicMarkdown(event.rawText || '') + renderEventImages(event) + '</div></article>';
      }

      if (event.kind === 'assistant_final') {
        return '<article class="message message--final assistant"><div class="message-head"><span class="message-head-main"><span class="role">Assistant</span><span>' + escapeHtml(event.timestampLocal || '') + '</span></span>' + copyButton + '</div><div class="message-blocks">' + renderDeterministicMarkdown(event.rawText || '') + '</div></article>';
      }

      return '';
    }

    function renderCollapsedProcessItems(items, options) {
      if (!items.length) return '';
      const summaryHtml = summarizeProcessItems(items, options);
      return renderLazyDetails('collapsed-group', summaryHtml, () => items.map(item => renderProcessDetailItem(item)).join(''), options);
    }

    function hydrateLazyDetail(details) {
      if (!details || !details.querySelector) return;
      const body = details.querySelector('[data-lazy-detail-body]');
      if (!body) return;
      const rendererId = body.getAttribute('data-lazy-detail-id');
      const renderer = rendererId ? lazyDetailRenderers.get(rendererId) : null;
      if (details.open) {
        if (body.dataset.rendered !== '1') {
          body.innerHTML = renderer ? renderer() : '';
          body.dataset.rendered = '1';
          highlightMatchesInElement(body, getSearchTerms(viewerSearchQuery));

    }

    function hydrateOpenLazyDetails(root) {

    function renderReaderToolbarActions(session) {
      let sessionButton = '';
      if (typeof isExternalSource === 'function' && isExternalSource()) {

      } else if (!buildResumeCommand(session)) {

        sessionButton = '<button type="button" disabled title="' + escapeHtml(title) + '">SESSION</button>';
      } else {

      }
      return '<button type="button" onclick="copyCurrentPath()" title="复制当前会话路径">路径</button>' +
        '<button type="button" onclick="exportSelectedMarkdown()">导出 MD</button>' +
        sessionButton +
        '<button type="button" id="refreshCurrentButton" class="quick-refresh-btn" onclick="refreshCurrentSession()" title="只重新读取当前会话">快刷</button>' +
      '';
